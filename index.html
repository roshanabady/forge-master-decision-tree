<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Master — Build Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
<style>
:root {
  --surface-0: #121212;
  --surface-1: #1a1a1a;
  --surface-2: #242424;
  --border: #333333;
  --border-strong: #444444;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #777777;
  --radius: 8px;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: var(--surface-0);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

/* Global input styling adapting to context variables */
input[type="text"],
input[type="number"],
select {
  background: var(--surface-0) !important;
  color: var(--text-primary) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px;
  padding: 4px 6px;
  outline: none;
}
/* Remove number input spinner arrows */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"] {
  -moz-appearance: textfield;
}
input[type="text"]:focus,
input[type="number"]:focus,
select:focus {
  border-color: var(--theme-color, #378ADD) !important;
}
select option:disabled {
  color: #666 !important;
}
button {
  background: var(--surface-1) !important;
  color: var(--text-primary) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover {
  background: var(--surface-2) !important;
  border-color: var(--border-strong) !important;
}
input[type="checkbox"] {
  accent-color: var(--theme-color, #378ADD);
}

.ecard {
  position: absolute;
  background: var(--surface-2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.12s, height 0.2s ease-out, width 0.2s ease-out, opacity 0.2s;
  z-index: 10;
}
.ecard:hover { border-color: var(--border-strong); }
.ecard.sel {
  border: 1.5px solid var(--theme-color, #378ADD);
  z-index: 50;
  cursor: default;
  opacity: 1 !important;
  height: auto !important;
  overflow: visible;
}
.etop { height: 14px; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
.etop span { font-size: 7px; font-weight: 900; letter-spacing: 0.5px; color: rgba(0,0,0,0.7); text-shadow: 0 1px 0 rgba(255,255,255,0.15); }
.tcheck { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); margin: 3px 0; cursor: pointer; }
.ss-row { display: grid; grid-template-columns: 1fr 58px 12px; gap: 4px; align-items: center; margin: 4px 0; }
</style>

</head>
<body>
<div style="padding:0.75rem 1rem 0; height:100vh; box-sizing:border-box; display:flex; flex-direction:column; user-select:none;">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px;flex-wrap:wrap;gap:6px;flex-shrink:0;">
  <span style="font-size:14px;font-weight:500;color:var(--text-primary);">Build tracker — Forge Master</span>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="display:flex;gap:8px;font-size:11px;color:var(--text-muted);">
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#968DF2;margin-right:3px;vertical-align:middle;"></span>Gear</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ACC97;margin-right:3px;vertical-align:middle;"></span>Mount</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#E96B3E;margin-right:3px;vertical-align:middle;"></span>Pet</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#DCA63B;margin-right:3px;vertical-align:middle;"></span>Skills</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2982D9;margin-right:3px;vertical-align:middle;"></span>Tech</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#C497FE;margin-right:3px;vertical-align:middle;"></span>Ascension</span>
    </div>
    <button onclick="openNewCardModal()" style="font-size:11px;padding:4px 10px;" title="Add new card"><i class="ti ti-plus" aria-hidden="true"></i> New Card</button>
    <button onclick="fitToScreen()" style="font-size:11px;padding:4px 8px;opacity:0.7;" title="Scale the whole board to fit your screen"><i class="ti ti-arrows-diagonal-minimize-2" aria-hidden="true"></i> Fit Screen</button>

    <button onclick="layoutCleanup()" style="font-size:11px;padding:4px 8px;opacity:0.7;" title="Snap current card positions to grid without moving them out of place"><i class="ti ti-broom" aria-hidden="true"></i> Layout Clean-up</button>
    <button onclick="exportJSON()" style="font-size:11px;padding:4px 8px;" title="Download build as JSON"><i class="ti ti-download" aria-hidden="true"></i></button>
    <button onclick="document.getElementById('import-file').click()" style="font-size:11px;padding:4px 8px;" title="Import build from JSON"><i class="ti ti-upload" aria-hidden="true"></i></button>
    <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importJSON(event)">
    <span id="save-btn" style="font-size:11px;padding:4px 6px;opacity:0.5;"></span>
  </div>
</div>

<div id="canvas-wrap" style="flex:1;min-height:0;overflow:hidden;">
<div id="canvas" style="position:relative;width:1800px;height:1000px;background:var(--surface-1);border:2px solid #DCA63B;border-radius:12px;overflow:visible;transform-origin:0 0;">
  <svg id="svg-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
  <div id="cards"></div>
</div>
</div>
</div>

<!-- New card modal -->
<div id="new-card-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--surface-2);border:1px solid var(--border-strong);border-radius:12px;padding:24px 28px;min-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.5);" onclick="event.stopPropagation()">

    <div id="new-card-type-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;">
      <button onclick="pickNewCardType('gear')"    style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;"><i class="ti ti-settings" style="font-size:20px;color:#968DF2;"></i>Gear</button>
      <button onclick="pickNewCardType('mount')"   style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;"><i class="ti ti-motorbike" style="font-size:20px;color:#2ACC97;"></i>Mount</button>
      <button onclick="pickNewCardType('pet')"     style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;"><i class="ti ti-paw" style="font-size:20px;color:#E96B3E;"></i>Pet</button>
      <button onclick="pickNewCardType('skills')"  style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;"><i class="ti ti-bolt" style="font-size:20px;color:#DCA63B;"></i>Skill</button>
      <button onclick="pickNewCardType('techtree')" style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;"><i class="ti ti-sitemap" style="font-size:20px;color:#2982D9;"></i>Tech Tree</button>
    </div>
    <div id="new-card-gear-grid" style="display:none;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px;"></div>
    <button id="new-card-back-btn" onclick="backNewCardModal()" style="display:none;width:100%;padding:6px;font-size:11px;opacity:0.7;margin-bottom:8px;">← Back</button>
    <button onclick="closeNewCardModal()" style="width:100%;padding:6px;font-size:11px;opacity:0.7;">Cancel</button>
  </div>
</div>

// Sum of Tech Tree mastery node percentages, split by which stat they boost (per Forge Master wiki: +2% per point)
function techMasteryPct(nodes){
  const p={damage:0,hp:0};
  TN.forEach(n=>{if(nodes&&nodes[n.id])p[n.stat]+=n.pct;});
  return p;
}

  helmet:'icons/gears/head.png',gloves:'icons/gears/hands.png',necklace:'icons/gears/neck.png',

function itemIcon(e,d){
  const n=(d.name||'').toLowerCase();
  if(e.type==='mount') return MOUNT_NAME_ICON[n]||e.icon;
  if(e.type==='pet'||e.type==='parked') return PET_NAME_ICON[n]||e.icon;
  return PET_NAME_ICON[n]||SLOT_ICON[e.id]||e.slotIcon||e.icon;
}
function tiClass(icon){
  const v=icon||'ti-help';
  return v.startsWith('ti-')?v:'ti-'+v;
}
function renderIcon(iconVal,col,fallbackIcon,size=14){
  const fb=tiClass(fallbackIcon);
  const px=size+'px';
  const fs=Math.max(10,Math.round(size*0.85))+'px';
  if(iconVal.endsWith('.png')){
    const mask=`background-color:${col};-webkit-mask-image:url(${iconVal});mask-image:url(${iconVal});-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;`;
    return `<span style="display:inline-flex;width:${px};height:${px};margin-top:1px;flex-shrink:0;align-items:center;justify-content:center;position:relative;" aria-hidden="true">`+
      `<span class="ic-mask" style="display:block;width:${px};height:${px};${mask}"></span>`+
      `<img src="${iconVal}" alt="" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;" onerror="const p=this.parentElement;p.querySelector('.ic-mask').style.display='none';p.querySelector('.ic-fb').style.display='inline-block';">`+
      `<i class="ti ic-fb ${fb}" style="display:none;font-size:${fs};color:${col};line-height:1;" aria-hidden="true"></i>`+
    `</span>`;
  }
  return `<i class="ti ${tiClass(iconVal)}" style="font-size:${fs};color:${col};margin-top:1px;flex-shrink:0;" aria-hidden="true"></i>`;
}

let _restoreFocusId=null,_restoreFocusSel=null,_skipFocusRestore=false;
function captureFocus(el){
  if(!el||!el.id||_tabNav)return;
  _restoreFocusId=el.id;
  _restoreFocusSel=el.selectionStart!=null?el.selectionStart:null;
}
function restoreFocus(){
  if(_skipFocusRestore){_restoreFocusId=null;_restoreFocusSel=null;return;}
  const fid=_restoreFocusId,fsel=_restoreFocusSel;
  _restoreFocusId=null;_restoreFocusSel=null;
  if(!fid)return;
  requestAnimationFrame(()=>{
    const el=document.getElementById(fid);
    if(!el)return;
    el.focus({preventScroll:true});
    if(fsel!=null&&el.setSelectionRange){try{el.setSelectionRange(fsel,fsel);}catch(e){}}
  });
}
function getCardFocusables(card){
  return [...card.querySelectorAll('input:not([disabled]):not([type=file]),select:not([disabled])')]
    .filter(el=>el.id&&el.offsetParent!==null)
    .sort((a,b)=>{
      const ra=a.getBoundingClientRect(),rb=b.getBoundingClientRect();
      const dy=ra.top-rb.top;
      if(Math.abs(dy)>6)return dy;
      return ra.left-rb.left;
    });
}

}

function initState(){
  ENTS.forEach(e=>{
    state[e.id]=defData(e.id);
    const s=SEED[e.id];
    if(!s) return;
    ['name','level','rarity','imageUrl','damage','hp','status'].forEach(f=>{if(s[f]!==undefined)state[e.id][f]=s[f];});
    if(s.substats) Object.assign(state[e.id].substats, s.substats);
    if(s.slots && e.type==='skills') state[e.id].slots=s.slots;
    else if(s.slots){
      state[e.id].activeSlots=s.slots;
      state[e.id].slotVals=s.slots.map(k=>parseFloat(s.substats?.[k])||0);
      syncSubstatsFromSlots(state[e.id]);
    }
  });
  state.charBonus={damagePct:0,hpPct:0};
}
function backfillSeed(){
  ENTS.forEach(e=>{
    const s=SEED[e.id];
    if(!s||!state[e.id]) return;
    if(s.damage&&!state[e.id].damage) state[e.id].damage=s.damage;
    if(s.hp&&!state[e.id].hp) state[e.id].hp=s.hp;
    if(e.type==='skills'){
      if(state[e.id].slots&&state[e.id].slots.length>3) state[e.id].slots=state[e.id].slots.slice(0,3);
      if(s.slots){
        const cur=state[e.id].slots||[];
        const empty=cur.every(sl=>!sl.name||!sl.name.trim());
        if(empty) state[e.id].slots=s.slots;
      }
    }
  });
}

async function openDB(){
  return new Promise((res,rej)=>{
    // Incremented to v9 for the new inventory system
    const r=indexedDB.open('forge-master-v9',1);
    r.onupgradeneeded=ev=>ev.target.result.createObjectStore('items',{keyPath:'id'});
    r.onsuccess=ev=>res(ev.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function loadDB(){
  try{
    db=await openDB();
    const tx=db.transaction('items','readonly'),st=tx.objectStore('items');
    // load deleted built-in slot ids first so they stay removed after reload
    await new Promise(res=>{
      const r=st.get('_deletedIds');
      r.onsuccess=()=>{
        if(r.result?.data){
          state.deletedIds=r.result.data;
          const delSet=new Set(state.deletedIds);
          ENTS=ENTS.filter(e=>!delSet.has(e.id));
        }
        res();
      };
      r.onerror=()=>res();
    });
    // load dynamic ent definitions first so their state loads correctly
    await new Promise(res=>{
      const r=st.get('_dynEnts');
      r.onsuccess=()=>{
        if(r.result?.data) r.result.data.forEach(e=>{
          if(!ENTS.find(x=>x.id===e.id)){
            // refresh w/h from the current base card of same type so size changes propagate
            const base=ENTS.find(x=>x.type===e.type&&!x._dynamic);
            if(base){e.w=base.w;e.h=base.h;}
            ENTS.push(e);
          }
        });
        res();
      };
      r.onerror=()=>res();
    });
    await Promise.all([...ENTS.map(e=>new Promise(res=>{
      const r=st.get(e.id);
      r.onsuccess=()=>{if(r.result)state[e.id]=r.result.data;res();};
      r.onerror=()=>res();
    })),new Promise(res=>{
      const r=st.get('_positions');
      r.onsuccess=()=>{if(r.result)state.positions=r.result.data;res();};
      r.onerror=()=>res();
    }),new Promise(res=>{
      const r=st.get('_charBonus');
      r.onsuccess=()=>{if(r.result)state.charBonus=r.result.data;res();};
      r.onerror=()=>res();
    })]);
  }catch(err){db=null;}
}
async function saveAll(){
  const btn=document.getElementById('save-btn');
  if(!db){btn.textContent='No DB';setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> Save';},2000);return;}
  const tx=db.transaction('items','readwrite'),st=tx.objectStore('items');
  ENTS.forEach(e=>st.put({id:e.id,data:state[e.id]}));
  st.put({id:'_positions',data:state.positions||{}});
  st.put({id:'_dynEnts',data:ENTS.filter(e=>e._dynamic)});
  st.put({id:'_deletedIds',data:state.deletedIds||[]});
  st.put({id:'_charBonus',data:state.charBonus||{damagePct:0,hpPct:0}});
  await new Promise(res=>{tx.oncomplete=res;tx.onerror=res;});
  btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Saved';
  setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> Save';},1500);
}

function fmtVal(v){
  const s=v.toFixed(10),dot=s.indexOf('.');
  return dot===-1?parseFloat(s):parseFloat(s.slice(0,dot+3));
}
function fmtBig(v){
  const t2=n=>{const s=n.toFixed(10),dot=s.indexOf('.');return dot===-1?parseFloat(s):parseFloat(s.slice(0,dot+3));};

  if(v>=1e9) return t2(v/1e9)+'b';
  if(v>=1e6) return t2(v/1e6)+'m';
  if(v>=1e3) return t2(v/1e3)+'k';
  return t2(v);
}
const BIG_SUFFIX={k:1e3,m:1e6,b:1e9,t:1e12};
function parseBig(str){
  if(str===undefined||str===null) return 0;
  const s=String(str).trim().toLowerCase();
  if(!s) return 0;
  const m=s.match(/^(-?[\d.]+)\s*([kmbt])?$/);
  if(!m) return isNaN(parseFloat(s))?0:parseFloat(s);
  const num=parseFloat(m[1]);
  if(isNaN(num)) return 0;
  return m[2]?num*BIG_SUFFIX[m[2]]:num;
}

function entPos(e){

function totals(){
  const t={damage:0,hp:0};SS.forEach(s=>t[s.k]=0);
  ENTS.filter(e=>['gear','mount','pet','parked','skills'].includes(e.type)).forEach(e=>{
    const d=state[e.id];
    if(!d) return;
    if(e.type!=='skills' && d.status==='parked') return;
    if(d.substats)SS.forEach(s=>{t[s.k]+=(parseFloat(d.substats[s.k])||0);});
    t.damage+=(parseFloat(d.damage)||0);
    t.hp+=(parseFloat(d.hp)||0);
  });
  // Apply Tech Tree mastery % (unlocked nodes) and manual level bonus % on top of the flat item totals.
  // NOTE: Ascension is NOT applied here — the DMG/HP you enter on each card already reflects your
  // real, current in-game stats (including any ascension boost already active on that item/pet/skill/mount).
  // Multiplying again here would double-count the boost and produce meaningless numbers.
  const techPct=techMasteryPct(state.techtree&&state.techtree.nodes);
  const lvlBonus=state.charBonus||{damagePct:0,hpPct:0};
  t.damage=t.damage*(1+(techPct.damage+(parseFloat(lvlBonus.damagePct)||0))/100);
  t.hp=t.hp*(1+(techPct.hp+(parseFloat(lvlBonus.hpPct)||0))/100);
  return t;
}

function cardBody(e,d,isSel){
  if(isSel) return makeInlineEditor(e,d);

  if(e.type==='skills'){
    const slots=d.slots||[],filled=slots.filter(s=>s.name&&s.name.trim()).length;
    const names=slots.filter(s=>s.name&&s.name.trim()).map(s=>{
      const sd=parseFloat(s.damage)||0,sh=parseFloat(s.hp)||0;
      const stats=(sd||sh)?` <span style="font-size:8px;color:var(--text-muted);">${sd?'⚔'+fmtBig(sd):''}${sd&&sh?' ':''}${sh?'♥'+fmtBig(sh):''}</span>`:'';
      return `<div style="font-size:10px;color:var(--text-secondary);padding:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.name} <span style="font-weight:500;color:var(--text-primary);">Lv${s.level}</span>${stats}</div>`;
    }).join('');
    const dmgV=parseFloat(d.damage)||0,hpV=parseFloat(d.hp)||0;
    const statsRow=(dmgV||hpV)?`<div style="display:flex;gap:8px;font-size:10px;color:var(--text-secondary);padding:1px 0;margin-bottom:2px;">${dmgV?`<span>⚔ <span style="font-weight:500;color:var(--text-primary);">${fmtBig(dmgV)}</span></span>`:''} ${hpV?`<span>♥ <span style="font-weight:500;color:var(--text-primary);">${fmtBig(hpV)}</span></span>`:''}</div>`:'';
    return `<div style="padding:3px 9px 8px;">${statsRow}<div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;">${filled}/3 configured</div>${names||'<div style="font-size:10px;color:var(--text-muted);font-style:italic;">tap to edit</div>'}</div>`;
  }
  if(e.type==='techtree'){
    const nodes=d.nodes||{},unlocked=TN.filter(n=>nodes[n.id]).length;
    const groups=[...new Set(TN.map(n=>n.g))];
    const lines=groups.map(g=>{const gn=TN.filter(n=>n.g===g),done=gn.filter(n=>nodes[n.id]).length,full=done===gn.length;return `<div style="font-size:10px;color:${full?'#2ACC97':'var(--text-secondary)'};padding:1px 0;">${g}: ${done}/${gn.length}${full?' ✓':''}</div>`;}).join('');
    return `<div style="padding:3px 9px 8px;"><div style="height:3px;background:var(--surface-0);border-radius:2px;overflow:hidden;margin-bottom:5px;"><div style="width:${Math.min(100,(unlocked/TN.length)*100)}%;height:100%;background:#185FA5;border-radius:2px;"></div></div>${lines}</div>`;
  }
  if(e.type==='ascension'){
    const stars=d.stars||{},prog=ascensionProgress();
    const total=PILLARS.reduce((n,p)=>n+(stars[p.k]||0),0);
    const rows=PILLARS.map(p=>{
      const s=stars[p.k]||0,pr=prog[p.k];
      const met=pr.cur>=pr.req;
      return `<div style="display:flex;justify-content:space-between;align-items:center;font-size:9px;padding:1px 0;gap:4px;">
        <span style="color:var(--text-secondary);flex-shrink:0;">${p.l}</span>
        <span style="color:#FACC15;letter-spacing:-1px;font-size:10px;">${starStr(s)}</span>
        <span style="color:${met?'#2ACC97':'var(--text-muted)'};font-size:8px;flex-shrink:0;">${pr.cur}/${pr.req}</span>
      </div>`;
    }).join('');
    return `<div style="padding:3px 9px 8px;">
      <div style="font-size:9px;color:var(--text-muted);margin-bottom:4px;">${total}/12 stars — progress tracker only</div>
      ${rows}
    </div>`;
  }

  if(['gear','mount','pet','parked'].includes(e.type)) ensureSlotVals(d);
  const active = (d.activeSlots || ['','']).filter(k=>k);
  const sortedSlots = [...active].sort((a,b) => {
    const valA = parseFloat((d.substats || {})[a]) || 0;
    const valB = parseFloat((d.substats || {})[b]) || 0;
    return valB - valA;
  });

  const t = ((d.status||'equipped')==='parked' && !isSel) ? totals() : null;

  const rows=sortedSlots.map(k=>{
    const s=SS.find(ss=>ss.k===k),v=parseFloat((d.substats||{})[k])||0;
    if(!s) return '';
    let delta='';
    if(t && v>0 && s.tgt){
      const cur=fmtVal(t[k]),gap=fmtVal(s.tgt-cur);
      if(gap>0) delta=`<span style="font-size:8px;color:#2ACC97;margin-left:3px;" title="Build needs ${gap}% more ${s.l}">▲</span>`;
    }
    return `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);padding:1px 0;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">${s.l}${delta}</span><span style="font-weight:500;color:${v>0?'var(--text-primary)':'var(--text-muted)'};flex-shrink:0;margin-left:4px;">${v>0?(k==='cooldown'?'-':'')+fmtVal(v)+'%':'—'}</span></div>`;
  }).join('');
  return `<div style="padding:3px 9px 8px;">${rows}</div>`;
}

function ssOptions(selectedKey,takenKeys=[]){
  const taken=new Set(takenKeys.filter(k=>k&&k!==selectedKey));
  return [...SS].sort((a,b)=>a.l.localeCompare(b.l)).map(s=>{
    const dis=taken.has(s.k);
    return `<option value="${s.k}"${s.k===selectedKey?' selected':''}${dis?' disabled':''}>${s.l} (max ${s.max}%)</option>`;
  }).join('');
}

          <div style="display:flex;align-items:center;gap:3px;">
            <span style="font-size:10px;color:var(--text-muted);">♥</span>
            <input id="ef-skill-${i}-hp" type="text" placeholder="HP" value="${sk.hp?fmtBig(sk.hp):''}" onchange="updSkill(${i},'hp',parseBig(this.value),this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
          </div>
        </div>
      </div>`).join('');
  } else if(e.type==='ascension'){
    const stars=d.stars||{},prog=ascensionProgress();
    content=`<div style="font-size:9px;color:var(--text-muted);margin:2px 0 6px;display:flex;align-items:center;gap:4px;">
      <span>Progress only — no DMG/HP change</span>
      ${infoIcon('Tracks ascension stars per pillar (up to A3). Does not change build totals — update item DMG/HP after re-equipping post-reset.')}
      <a href="${ASC_WIKI}" target="_blank" rel="noopener" style="color:#C497FE;margin-left:auto;font-size:8px;">Wiki ↗</a>
    </div>`;
    content+=PILLARS.map(p=>{
      const s=stars[p.k]||0,pr=prog[p.k],met=pr.cur>=pr.req;
      const btns=[0,1,2,3].map(n=>`<button onclick="updAscStar('${p.k}',${n})" style="font-size:9px;padding:1px 0;flex:1;min-width:0;${s===n?'background:#C497FE !important;color:#1A1033 !important;border-color:#C497FE !important;font-weight:700;':'opacity:0.55;'}">${ascTierLabel(n)}</button>`).join('');
      return `<div style="margin:0 0 5px;padding-bottom:4px;border-bottom:0.5px solid var(--border);">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;">
          <span style="font-size:10px;font-weight:600;color:var(--text-primary);">${p.l}</span>
          <span style="font-size:10px;color:#FACC15;letter-spacing:-1px;">${starStr(s)}</span>
          ${infoIcon(`Req: ${p.reqLabel}. Keep: ${p.keep}. On reset: ${p.reset}`)}
        </div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px;align-items:center;">
          <div style="display:flex;align-items:center;gap:3px;">
            <input id="ef-ascension-${p.levelKey}" type="number" min="1" max="149" value="${d[p.levelKey]||1}" onchange="updField('ascension','${p.levelKey}',+this.value,this)" style="font-size:10px;padding:2px 3px;width:40px;box-sizing:border-box;text-align:center;">
            <span style="font-size:9px;color:${met?'#2ACC97':'var(--text-muted)'};white-space:nowrap;">/${pr.req}${met?' ✓':''}</span>
          </div>
          <div style="display:flex;gap:2px;">${btns}</div>
        </div>
      </div>`;
    }).join('');
  } else if(e.type==='techtree'){
    const nodes=d.nodes||{};
    const cb=state.charBonus||{damagePct:0,hpPct:0};
    content=`<div style="font-size:9px;color:var(--text-muted);margin:4px 0 6px;">Skip Skill DMG nodes</div>`;
    content+=TN.map(n=>`<label class="tcheck" style="gap:4px;font-size:10px;margin:2px 0;"><input id="ef-tech-${n.id}" type="checkbox" ${nodes[n.id]?'checked':''} onchange="updTechNode('${n.id}',this.checked,this)" style="margin:0;transform:scale(0.85);"><span>${n.l} (+${n.pct}% ${n.stat==='damage'?'DMG':'HP'})</span></label>`).join('');
    content+=`<div style="font-size:10px;font-weight:500;color:var(--text-secondary);margin:8px 0 2px;">Character Level Bonus</div>
      <div style="font-size:9px;color:var(--text-muted);margin-bottom:4px;">Manual % from Forge Level (not derivable from checkboxes)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">⚔</span>
          <input id="ef-charBonus-damagePct" type="number" step="0.1" min="0" placeholder="DMG %" value="${cb.damagePct||0}" onchange="updCharBonus('damagePct',+this.value,this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">♥</span>
          <input id="ef-charBonus-hpPct" type="number" step="0.1" min="0" placeholder="HP %" value="${cb.hpPct||0}" onchange="updCharBonus('hpPct',+this.value,this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
      </div>`;
  } else {
    const rarList=e.type==='gear'?GEAR_RARITIES:PARKED_RARITIES;
    ensureSlotVals(d);
    const active=d.activeSlots||['',''];

    const ssRows=active.map((k,i)=>{
      const v=fmtVal(parseFloat((d.slotVals||[])[i])||0);
      const taken=active.filter((_,j)=>j!==i);
      return `<div style="margin:3px 0;">
        <select id="ef-${e.id}-slot-${i}" onchange="updSlot('${e.id}',${i},this.value,this)" style="font-size:9px;padding:2px 4px;width:100%;box-sizing:border-box;">
          <option value=""${!k?' selected':''}>— Substat —</option>
          ${ssOptions(k,taken)}
        </select>
        <div style="display:flex;align-items:center;gap:3px;margin-top:2px;">
          <input type="number" step="0.1" value="${v||''}" placeholder="0" oninput="updStatVal('${e.id}',${i},+this.value)" id="ssval-${e.id}-${i}" style="font-size:10px;padding:2px 4px;text-align:right;width:50px;min-width:0;box-sizing:border-box;"${k?'':' disabled'}>
          <span style="font-size:9px;color:var(--text-muted);flex-shrink:0;">%</span>
        </div>
      </div>`;
    }).join('');

    let swapHTML = '';

    content=`
      <div style="margin-top:6px;display:grid;grid-template-columns:1fr 42px;gap:4px;">
        <input id="ef-${e.id}-name" type="text" placeholder="Item Name" value="${d.name||''}" onchange="updField('${e.id}','name',this.value,this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;">
        <input id="ef-${e.id}-level" type="number" placeholder="Lv" value="${d.level||''}" min="0" onchange="updField('${e.id}','level',+this.value||0,this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:center;">
      </div>
      <div style="margin-top:4px;">
        <select id="ef-${e.id}-rarity" onchange="updField('${e.id}','rarity',this.value,this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;">
          ${rarList.map(r=>`<option value="${r}"${d.rarity===r?' selected':''}>${r||'— Rarity —'}</option>`).join('')}
        </select>
      </div>
      <div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">⚔</span>
          <input id="ef-${e.id}-damage" type="text" placeholder="DMG (e.g. 13.5m)" value="${d.damage?fmtBig(d.damage):''}" onchange="updField('${e.id}','damage',parseBig(this.value),this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">♥</span>
          <input id="ef-${e.id}-hp" type="text" placeholder="HP (e.g. 7b)" value="${d.hp?fmtBig(d.hp):''}" onchange="updField('${e.id}','hp',parseBig(this.value),this)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
      </div>
      <div style="font-size:10px;font-weight:500;color:var(--text-secondary);margin:6px 0 2px;">Substats</div>
      ${ssRows}
      ${swapHTML}`;
  }

  const curStatus=(d.status||'equipped');
  const showStatus=isMount||isPet||isParked;
  let equipDisabled=false, equipLabel='Equipped';
  if((isPet||isParked)&&curStatus!=='equipped'){
    const eqCount=ENTS.filter(x=>(x.type==='pet'||x.type==='parked')&&(state[x.id]?.status||'equipped')==='equipped').length;
    equipDisabled=eqCount>=3;
    if(equipDisabled) equipLabel='Full (3/3)';
  }
  if(isMount&&curStatus!=='equipped'){
    const mountEq=ENTS.filter(x=>x.type==='mount'&&(state[x.id]?.status||'equipped')==='equipped').length;
    equipDisabled=mountEq>=1;
    if(equipDisabled) equipLabel='Full (1/1)';
  }
  const statusBtns=showStatus?`
    <div style="display:flex;gap:4px;margin-top:4px;">
      <button onclick="updField('${e.id}','status','equipped')" ${equipDisabled?'disabled':''} style="font-size:9px;padding:2px 6px;flex:1;${curStatus==='equipped'?'background:#2ACC97;color:#fff;border-color:#2ACC97;font-weight:600;':equipDisabled?'opacity:0.3;cursor:not-allowed;':'opacity:0.55;'}">${equipLabel}</button>
      <button onclick="updField('${e.id}','status','parked')" style="font-size:9px;padding:2px 6px;flex:1;${curStatus==='parked'?'background:#666;color:#fff;border-color:#666;font-weight:600;':'opacity:0.55;'}">Parked</button>
    </div>`:'';
  return `<div style="padding:2px 9px 8px;" onclick="event.stopPropagation();">
    ${content}
    ${statusBtns}
    <div style="display:flex;gap:4px;margin-top:6px;">
      <button onclick="deleteEnt('${e.id}')" style="font-size:9px;padding:2px 8px;background:#5c1a1a !important;color:#f87171 !important;border-color:#7f1d1d !important;">Delete</button>
    </div>
  </div>`;
}

function renderCards(){
  if(!_restoreFocusId){
    const active=document.activeElement;
    if(active&&active.id){
      _restoreFocusId=active.id;
      if(active.selectionStart!=null)_restoreFocusSel=active.selectionStart;
    }
  }
  const t=totals();let h='';
  ENTS.forEach(e=>{
    const d=state[e.id]||defData(e.id),col=COL[e.type],isSel=selId===e.id;
    const isStatEnt=['gear','mount','pet','parked'].includes(e.type);
    const title=isStatEnt&&d.name?d.name:e.label;
    const lv=d.level?` Lv.${d.level}`:'';
    const isParked=(d.status||'equipped')==='parked';
    const statusFooter=isStatEnt&&!isSel
      ?(isParked
        ?`<div onclick="event.stopPropagation();toggleStatus('${e.id}')" style="position:absolute;bottom:0;left:0;right:0;height:10px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;cursor:pointer;"><span style="font-size:7px;letter-spacing:1px;font-weight:600;color:#666;">PARKED</span></div>`
        :`<div onclick="event.stopPropagation();toggleStatus('${e.id}')" style="position:absolute;bottom:0;left:0;right:0;height:10px;background:#2ACC97;display:flex;align-items:center;justify-content:center;cursor:pointer;"><span style="font-size:7px;letter-spacing:1px;font-weight:600;color:#0f2a1a;">EQUIPPED</span></div>`)
      :'';
    let subtitle='';
    if(e.type==='gear'&&d.name) subtitle=(d.level?lv.trim():'')+` · ${e.label}`;
    else if(e.type==='gear') subtitle=d.level?lv.trim():'';
    else if((e.type==='mount'||e.type==='pet'||e.type==='parked')&&d.level) subtitle=lv.trim();
    const tcol=d.rarity&&RARITY_COL[d.rarity]?RARITY_COL[d.rarity]:col;
    
    const opacityStyle = (isParked && !isSel) ? 'opacity: 0.65;' : '';

    let calcHeight = e.h;
    if(isSel) {
      if(e.type==='skills') calcHeight = 280;
      else if(e.type==='techtree') calcHeight = 240;
      else if(e.type==='ascension') calcHeight = 300;
      else if(e.type==='gear') calcHeight = 218;
      else calcHeight = 254;
    }

    const pos=state.positions&&state.positions[e.id]?state.positions[e.id]:{x:e.x,y:e.y};
    const renderW=cardW(e,d);
    h+=`<div class="ecard ${e.type}${isSel?' sel':''}" data-eid="${e.id}" style="left:${pos.x}px;top:${pos.y}px;width:${renderW}px;height:${calcHeight}px;--theme-color:${tcol};${opacityStyle};cursor:pointer;" onmousedown="startDrag(event,'${e.id}')" onclick="cardClick(event,'${e.id}')">
      <div class="etop" style="background:${tcol};" onmousedown="event.stopPropagation()" onclick="toggleEditRibbon(event,'${e.id}')">${d.rarity?`<span>${d.rarity}</span>`:''}</div>
      <div style="padding:5px 9px 2px;display:flex;align-items:flex-start;gap:5px;position:relative;">
        ${renderIcon(itemIcon(e,d),tcol,e.icon)}
        <div style="overflow:hidden;min-width:0;flex:1;">
          <div style="font-size:11px;font-weight:500;color:var(--text-primary);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.2;">${title}${!d.name&&e.type==='gear'&&lv?lv:''}</div>
          ${subtitle?`<div style="font-size:9px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${subtitle}</div>`:''}
        </div>
        ${(()=>{const dv=parseFloat(d.damage)||0,hv=parseFloat(d.hp)||0;return(dv||hv)?`<div style="display:flex;flex-direction:column;align-items:flex-end;font-size:7px;color:var(--text-muted);flex-shrink:0;line-height:1.3;">${dv?`<span>⚔${fmtBig(dv)}</span>`:''}${hv?`<span>♥${fmtBig(hv)}</span>`:''}</div>`:''})()}
        ${isSel?`<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;"><button onclick="closeEdit(event)" style="font-size:11px;padding:0 5px;line-height:17px;border-radius:3px;opacity:0.7;" title="Close">×</button><button onclick="event.stopPropagation();dupEnt('${e.id}')" style="font-size:9px;padding:0 5px;line-height:17px;border-radius:3px;opacity:0.7;" title="Duplicate"><i class="ti ti-copy" aria-hidden="true"></i></button></div>`:''}
      </div>
      ${cardBody(e,d,isSel)}
      ${statusFooter}
    </div>`;
  });
  const isSumSel=selId==='summary';
  // Split substats: those with a target get horizontal rows; the rest get a vertical bar chart
  const mainSS=SS.filter(s=>s.tgt);
  const restSS=SS.filter(s=>!s.tgt);
  const mainRows=mainSS.map(s=>{
    const v=parseFloat(t[s.k])||0;
    const pct=Math.min(100,(v/s.tgt)*100);
    const met=v>=s.tgt;
    const bc=met?'#2ACC97':v>s.tgt*0.55?'#DCA63B':'#E96B3E';
    return `<div style="display:grid;grid-template-columns:90px 1fr 48px 60px;gap:6px;align-items:center;padding:4px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:11px;color:var(--text-secondary);">${s.l}</span>
      <div style="height:4px;background:var(--surface-0);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${bc};border-radius:2px;transition:width 0.3s;"></div></div>
      <span style="font-size:11px;font-weight:500;color:${met?'#2ACC97':'var(--text-primary)'};text-align:right;">${s.k==='cooldown'?'-':''}${fmtVal(v)}%</span>
      <span style="font-size:10px;color:var(--text-muted);text-align:right;">${s.tl}</span>
    </div>`;
  }).join('');
  const CHART_H=52;
  const restVals=restSS.map(s=>parseFloat(t[s.k])||0);
  const globalMax=Math.max(...restVals,1);
  const chartArea=restSS.map((s,i)=>{
    const v=restVals[i];
    const pct=Math.min(100,(v/globalMax)*100);
    const barH=Math.max(v>0?2:0,Math.round((pct/100)*CHART_H));
    const abbr=s.l.replace(' Chance','C').replace(' Speed','Spd').replace(' DMG','D').replace(' Regen','Rgn').replace('Ranged','Rng').replace('Melee','Mle').replace('Skill','Skl');
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;">
      <span style="font-size:7px;font-weight:500;color:var(--text-primary);height:10px;">${v>0?(s.k==='cooldown'?'-':'')+fmtVal(v):''}</span>
      <div style="height:${CHART_H}px;display:flex;align-items:flex-end;width:100%;"><div style="width:100%;height:${barH}px;background:#378ADD;border-radius:2px 2px 0 0;transition:height 0.3s;"></div></div>
      <span style="font-size:7px;color:var(--text-muted);text-align:center;line-height:1.1;margin-top:2px;">${abbr}</span>
    </div>`;
  }).join('');
  const sumPos=state.positions&&state.positions["summary"]?state.positions["summary"]:{x:SUM.x,y:SUM.y};
  h+=`<div class="ecard summary${isSumSel?' sel':''}" data-eid="summary" style="left:${sumPos.x}px;top:${sumPos.y}px;width:${SUM.w}px;cursor:pointer;" onmousedown="startDrag(event,'summary')" onclick="cardClick(event,'summary')">
    <div class="etop" style="background:#378ADD;"></div>
    <div style="padding:6px 12px 4px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:5px;">
        <i class="ti ti-chart-bar" style="font-size:12px;color:#378ADD;" aria-hidden="true"></i>
        <span style="font-size:11px;font-weight:500;color:var(--text-primary);">Build summary</span>
      </div>
      <div style="display:flex;gap:10px;font-size:10px;color:var(--text-secondary);">
        <span>⚔ <span style="font-weight:600;color:var(--text-primary);">${fmtBig(t.damage)||'—'}</span></span>
        <span>♥ <span style="font-weight:600;color:var(--text-primary);">${fmtBig(t.hp)||'—'}</span></span>
      </div>
    </div>
    <div style="padding:0 12px 4px;">${mainRows}</div>
    <div style="padding:4px 8px 8px;">
      <div style="display:flex;gap:3px;">${chartArea}</div>
    </div>
  </div>`;
  document.getElementById('cards').innerHTML=h;
  restoreFocus();
}

function renderSummaryRows(){
  const t=totals();let h='';
  h+=`<div style="display:flex;gap:20px;padding:6px 0 8px;border-bottom:0.5px solid var(--border);margin-bottom:4px;">
    <div style="font-size:12px;color:var(--text-secondary);">⚔ Total DMG <span style="font-weight:600;color:var(--text-primary);margin-left:4px;">${fmtBig(t.damage)}</span></div>
    <div style="font-size:12px;color:var(--text-secondary);">♥ Total HP <span style="font-weight:600;color:var(--text-primary);margin-left:4px;">${fmtBig(t.hp)}</span></div>
  </div>`;
  SS.forEach(s=>{
    const raw=t[s.k],v=fmtVal(raw),pct=s.tgt?Math.min(100,(raw/s.tgt)*100):Math.min(100,(raw/s.max)*50),met=s.tgt&&raw>=s.tgt,bc=met?'#2ACC97':s.tgt&&raw>s.tgt*0.55?'#DCA63B':'#378ADD';
    h+=`<div style="display:grid;grid-template-columns:110px 1fr 56px ${s.tgt?'80px':'0'};gap:8px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:12px;color:var(--text-secondary);">${s.l}</span>
      <div style="height:4px;background:var(--surface-0);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${bc};border-radius:2px;transition:width 0.3s;"></div></div>
      <span style="font-size:12px;font-weight:500;color:${met?'#2ACC97':'var(--text-primary)'};text-align:right;">${s.k==='cooldown'?'-':''}${v}%</span>
      ${s.tgt?`<span style="font-size:10px;color:var(--text-muted);text-align:right;">${s.tl}</span>`:''}
    </div>`;
  });
  document.getElementById('summary-rows').innerHTML=h;
}

function selEnt(id){
  if(selId === id) return;
  selId=id;
  renderCards();
}

function flushEditorValues(){
  const cur=document.activeElement;
  if(cur&&cur.closest&&cur.closest('.ecard.sel')&&typeof cur.blur==='function') cur.blur();
}

function toggleEditRibbon(ev,id){
  ev.stopPropagation();
  if(selId===id){
    flushEditorValues();
    selId=null;
    renderCards();
    if(db) saveAll();
  }else{
    selEnt(id);
  }
}

function cardClick(ev,id){
  if(_dragMoved){_dragMoved=false;return;}
  ev.stopPropagation();
  selEnt(id);
}

function closeEdit(e){
  if(e) e.stopPropagation();
  flushEditorValues();
  selId=null;
  renderCards();
  if(db) saveAll();
}

function updSlot(id,slotIdx,newKey,el){
  captureFocus(el);
  const d=state[id];
  ensureSlotVals(d);
  d.activeSlots[slotIdx]=newKey;
  d.slotVals[slotIdx]=0;
  syncSubstatsFromSlots(d);
  renderCards();queueSave();
}

function updStatVal(id,slotIdx,val){
  const d=state[id];
  ensureSlotVals(d);
  d.slotVals[slotIdx]=isNaN(val)?0:val;
  syncSubstatsFromSlots(d);
  queueSave();
}

function toggleStatus(id){
  const cur=(state[id]?.status||'equipped');
  const next=cur==='equipped'?'parked':'equipped';
  const ent=ENTS.find(e=>e.id===id);
  if(next==='equipped'){
    if(ent?.type==='mount'){
      const mountEq=ENTS.filter(e=>e.type==='mount'&&e.id!==id&&(state[e.id]?.status||'equipped')==='equipped').length;
      if(mountEq>=1) return;
    } else if(ent?.type==='pet'||ent?.type==='parked'){
      const eqCount=ENTS.filter(e=>(e.type==='pet'||e.type==='parked')&&e.id!==id&&(state[e.id]?.status||'equipped')==='equipped').length;
      if(eqCount>=3) return;
    }
  }
  updField(id,'status',next);
}

function updField(id,f,v,el){
  captureFocus(el);
  state[id][f]=v;
  if(f==='status'&&v==='equipped'){
    const ent=ENTS.find(e=>e.id===id);
    if(ent?.type==='mount'){
      ENTS.filter(e=>e.type==='mount'&&e.id!==id).forEach(e=>{state[e.id].status='parked';});
    } else if(ent?.type==='pet'||ent?.type==='parked'){
      const isPetType=t=>t==='pet'||t==='parked';
      const equipped=ENTS.filter(e=>isPetType(e.type)&&e.id!==id&&(state[e.id]?.status||'equipped')==='equipped');
      if(equipped.length>=3){
        state[id].status='parked';
        renderCards();queueSave();return;
      }
    }
  }
  const entForClamp=ENTS.find(e=>e.id===id);
  if(f==='status'&&entForClamp?.type==='mount') clampPositions();
  renderCards();
  queueSave();
}

function updSkill(i,f,v,el){
  captureFocus(el);
  if(!state.skills.slots) state.skills.slots=Array(3).fill(0).map(()=>({name:'',level:1,stype:'Active',damage:0,hp:0}));
  state.skills.slots[i][f]=v;
  renderCards();queueSave();
}

function updTechNode(nid,checked,el){
  captureFocus(el);
  if(!state.techtree.nodes) state.techtree.nodes={};
  state.techtree.nodes[nid]=checked;
  renderCards();queueSave();
}

function updCharBonus(f,v,el){
  captureFocus(el);
  if(!state.charBonus) state.charBonus={damagePct:0,hpPct:0};
  state.charBonus[f]=isNaN(v)?0:v;
  renderCards();queueSave();
}

function updAscStar(pillar,n){
  const d=state.ascension||defData('ascension');
  if(!d.stars) d.stars={forge:0,pets:0,skills:0,mounts:0};
  d.stars[pillar]=Math.max(0,Math.min(3,n|0));
  state.ascension=d;
  renderCards();queueSave();
}

function clearEnt(id){
  state[id]=defData(id);
  renderCards();queueSave();
}

const TYPE_ICON={gear:'ti-sword',mount:'ti-motorbike',pet:'ti-paw',parked:'ti-archive',skills:'ti-bolt',techtree:'ti-sitemap'};
const TYPE_LABEL={gear:'Gear',mount:'Ride',pet:'Pet',parked:'Inventory',skills:'Skills',techtree:'Tech Tree'};
const GEAR_PARTS=[
  {k:'head',   label:'Head',   icon:'ti-helmet',    slotIcon:'icons/gears/head.png'},
  {k:'armor',  label:'Armor',  icon:'ti-shield'},
  {k:'hands',  label:'Hands',  icon:'ti-hand-stop', slotIcon:'icons/gears/hands.png'},
  {k:'neck',   label:'Neck',   icon:'ti-tie',       slotIcon:'icons/gears/neck.png'},
  {k:'ring',   label:'Ring',   icon:'ti-circle',    slotIcon:'icons/gears/ring.png'},
  {k:'weapon', label:'Weapon', icon:'ti-sword',     slotIcon:'icons/gears/weapon.png'},
  {k:'feet',   label:'Feet',   icon:'ti-shoe',      slotIcon:'icons/gears/feet.png'},
  {k:'belt',   label:'Belt',   icon:'ti-label'},
];

function syncSubstatsFromSlots(d){
  if(!d.substats) d.substats={};
  SS.forEach(s=>d.substats[s.k]=0);
  const slots=d.activeSlots||[];
  const vals=d.slotVals||[];
  slots.forEach((k,i)=>{if(k)d.substats[k]=parseFloat(vals[i])||0;});
}
function ensureSlotVals(d){
  if(!d.activeSlots) d.activeSlots=['',''];
  if(!d.slotVals||d.slotVals.length!==d.activeSlots.length)
    d.slotVals=d.activeSlots.map(k=>(k&&d.substats)?(parseFloat(d.substats[k])||0):0);
  syncSubstatsFromSlots(d);
}

function resetNewCardModal(){
  document.getElementById('new-card-type-grid').style.display='grid';
  document.getElementById('new-card-gear-grid').style.display='none';
  document.getElementById('new-card-back-btn').style.display='none';
  document.getElementById('new-card-title').textContent='Add new card';
}
function buildGearPartGrid(){
  const grid=document.getElementById('new-card-gear-grid');
  if(grid.dataset.built) return;
  grid.innerHTML=GEAR_PARTS.map(p=>{
    const icon=renderIcon(p.icon,'#968DF2','ti-sword',22);
    return `<button onclick="createGearEnt('${p.k}')" style="padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;">${icon}<span>${p.label}</span></button>`;
  }).join('');
  grid.dataset.built='1';
}
function pickNewCardType(type){
  if(type==='gear'){
    buildGearPartGrid();
    document.getElementById('new-card-type-grid').style.display='none';
    document.getElementById('new-card-gear-grid').style.display='grid';
    document.getElementById('new-card-back-btn').style.display='block';
    document.getElementById('new-card-title').textContent='Choose gear slot';
    return;
  }
  createEnt(type);
}
function backNewCardModal(){ resetNewCardModal(); }

function openNewCardModal(){
  resetNewCardModal();
  const m=document.getElementById('new-card-modal');
  m.style.display='flex';
  m.onclick=closeNewCardModal;
}
function closeNewCardModal(){
  document.getElementById('new-card-modal').style.display='none';

}

function createGearEnt(partKey){
  const part=GEAR_PARTS.find(p=>p.k===partKey);
  if(!part) return;
  closeNewCardModal();
  const canvas=document.getElementById('canvas');
  const cW=canvas?canvas.clientWidth:800, cH=canvas?canvas.clientHeight:600;
  const id='gear_'+Date.now();
  const w=145,h=100;
  const newEnt={id,label:part.label,type:'gear',icon:part.icon,slotIcon:part.slotIcon,x:Math.round(cW/2-w/2),y:Math.round(cH/2-h/2),w,h,_dynamic:true};
  ENTS.push(newEnt);
  state[id]=defData(id);
  if(!state.positions)state.positions={};
  state.positions[id]={x:newEnt.x,y:newEnt.y};
  selId=id;
  renderCards();saveAll();
}

function createEnt(type){
  closeNewCardModal();
  const canvas=document.getElementById('canvas');
  const cW=canvas?canvas.clientWidth:800, cH=canvas?canvas.clientHeight:600;
  const id=type+'_'+Date.now();
  const isSkillType=type==='skills'||type==='techtree';
  const w=145, h=isSkillType?116:88;
  const newEnt={id,label:TYPE_LABEL[type],type,icon:TYPE_ICON[type],x:Math.round(cW/2-w/2),y:Math.round(cH/2-h/2),w,h,_dynamic:true};
  ENTS.push(newEnt);
  state[id]=defData(id);
  if(!state.positions)state.positions={};
  state.positions[id]={x:newEnt.x,y:newEnt.y};
  selId=id;
  renderCards();saveAll();
}

function dupEnt(srcId){
  const srcEnt=ENTS.find(e=>e.id===srcId);
  if(!srcEnt) return;
  const newId=srcEnt.type+'_'+Date.now();
  const srcPos=(state.positions&&state.positions[srcId])||{x:srcEnt.x,y:srcEnt.y};
  const canvas=document.getElementById('canvas');
  const cW=canvas?canvas.clientWidth:1800;
  const srcW=cardW(srcEnt,state[srcId]);
  let newX=snap(srcPos.x+srcW+8), newY=snap(srcPos.y);
  if(newX+CARD_W>cW-10){newX=snap(srcPos.x);newY=snap(srcPos.y+srcEnt.h+8);}
  const newEnt={id:newId,label:srcEnt.label,type:srcEnt.type,icon:srcEnt.icon,x:newX,y:newY,w:CARD_W,h:srcEnt.h,_dynamic:true};
  ENTS.push(newEnt);
  state[newId]=defData(newId);
  if(!state.positions)state.positions={};
  state.positions[newId]={x:newX,y:newY};
  selId=newId;
  renderCards();saveAll();
}

function deleteEnt(id){
  const ent=ENTS.find(e=>e.id===id);
  if(ent){
    // remove the card entirely, whether it's a built-in slot or a dynamically created one
    ENTS=ENTS.filter(e=>e.id!==id);
    delete state[id];
    if(state.positions) delete state.positions[id];
    if(!ent._dynamic){
      if(!state.deletedIds) state.deletedIds=[];
      if(!state.deletedIds.includes(id)) state.deletedIds.push(id);
    }
  }
  selId=null;
  renderCards();saveAll();
}

function swapEnts(id1){
  const id2 = document.getElementById('swap-' + id1).value;
  if(!id2 || id1 === id2) return;
  
  // Deep copy states to swap cleanly
  const temp = JSON.parse(JSON.stringify(state[id1]));
  state[id1] = JSON.parse(JSON.stringify(state[id2]));
  state[id2] = temp;
  
  renderCards();
  
  saveAll();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`forge-master-build-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importJSON(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const imported=JSON.parse(reader.result);
      ENTS.forEach(e=>{if(imported[e.id])state[e.id]=imported[e.id];});
      if(imported.positions) state.positions=imported.positions;
      renderCards();saveAll();
    }catch(err){alert('Invalid JSON file');}
  };
  reader.readAsText(file);
  ev.target.value='';
}

document.addEventListener('click',function(e){
  if(!selId) return;
  if(e.target.closest('.ecard.sel')) return;
  flushEditorValues();
  selId=null;renderCards();
  if(db) saveAll();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&selId){selId=null;renderCards();return;}
  if(e.key!=='Tab'||!selId)return;
  const card=document.querySelector('.ecard.sel');
  const cur=document.activeElement;
  if(!card||!cur||!card.contains(cur))return;
  if(!cur.matches('input,select,textarea'))return;
  const focusable=getCardFocusables(card);
  const idx=focusable.indexOf(cur);
  if(idx<0)return;
  e.preventDefault();
  const nextIdx=e.shiftKey?(idx-1+focusable.length)%focusable.length:(idx+1)%focusable.length;
  const nextId=focusable[nextIdx].id;
  _tabNav=true;
  _skipFocusRestore=true;
  cur.blur();
  requestAnimationFrame(()=>{
    _tabNav=false;
    const next=nextId?document.getElementById(nextId):null;
    if(next)next.focus();
    _skipFocusRestore=false;
  });
});

// --- Free drag (move) / click to edit ---
const GRID=8;
function snap(v){return Math.round(v/GRID)*GRID;}

let _drag=null, _dragMoved=false;
function startDrag(ev,id){
  if(ev.button!==0)return;
  const e=ENTS.find(e=>e.id===id);
  const defPos=e?{x:e.x,y:e.y}:(id==='summary'?{x:SUM.x,y:SUM.y}:{x:0,y:0});
  const cur=(state.positions&&state.positions[id])||defPos;
  _drag={id,startX:ev.clientX,startY:ev.clientY,origX:cur.x,origY:cur.y,moved:false};
}
document.addEventListener('mousemove',function(ev){
  if(!_drag)return;
  const dx=ev.clientX-_drag.startX,dy=ev.clientY-_drag.startY;
  if(!_drag.moved&&Math.abs(dx)<5&&Math.abs(dy)<5)return;
  _drag.moved=true;
  const newX=snap(Math.max(0,_drag.origX+dx)),newY=snap(Math.max(0,_drag.origY+dy));
  const el=document.querySelector(`[data-eid="${_drag.id}"]`);
  if(el){el.style.left=newX+'px';el.style.top=newY+'px';}
  if(!state.positions)state.positions={};
  state.positions[_drag.id]={x:newX,y:newY};
});
document.addEventListener('mouseup',function(ev){
  if(!_drag)return;
  if(_drag.moved){
    if(!state.positions)state.positions={};
    state.positions[_drag.id]={
      x:snap(Math.max(0,_drag.origX+(ev.clientX-_drag.startX))),
      y:snap(Math.max(0,_drag.origY+(ev.clientY-_drag.startY)))
    };
    _dragMoved=true;
    _drag=null;
    drawLines();queueSave();
  } else {
    _drag=null;
    // cardClick on the card will fire next and handle selection
  }
});
function autoLayout(){
  const canvas=document.getElementById('canvas');
  if(!canvas)return;
  const cW=canvas.clientWidth, cH=canvas.clientHeight;
  const cw=145, ch=100, gap=8, pad=10, row=ch+gap;
  if(!state.positions)state.positions={};
  const p=state.positions;

  // Gear row 1 (top-left): Head · Armor · Hands · Neck · Ring
  ['helmet','body','gloves','necklace','ring'].forEach((id,i)=>p[id]={x:pad+i*(cw+gap),y:pad});
  // Gear row 2: Weapon · Feet · Belt · [Equipped Mount — double width]
  ['weapon','boots','pelvic'].forEach((id,i)=>p[id]={x:pad+i*(cw+gap),y:pad+row});
  const ringRightEdge=pad+4*(cw+gap)+cw;
  const mountW=mountCardW(state['mount1']||{});
  p['mount1']={x:ringRightEdge-mountW,y:pad+row};

  // Spare inventory — center left
  const mountY=Math.round(cH/2)-row;
  p['inv1']  ={x:pad+cw+gap,y:mountY};

  // Pets — top right, 3 columns
  // Gather ALL pet-type entities, sort: equipped first (max 3), then by rarity desc
  const RARITY_RANK={'Mythic':6,'Ultimate':5,'Legendary':4,'Epic':3,'Rare':2,'Uncommon':1,'Common':0,'Quantum':7,'':-1};
  const petSlotIds=ENTS.filter(e=>e.type==='pet').map(e=>e.id);
  const petParkedIds=ENTS.filter(e=>e.type==='parked'&&e.id!=='inv1').map(e=>e.id);
  const petAllIds=[...petSlotIds,...petParkedIds];

  // Sort: equipped first, then by rarity desc within each group
  petAllIds.sort((a,b)=>{
    const da=state[a]||{}, db=state[b]||{};
    const ae=(da.status||'equipped')==='equipped', be=(db.status||'equipped')==='equipped';
    if(ae!==be) return be-ae;
    return (RARITY_RANK[db.rarity]??-1)-(RARITY_RANK[da.rarity]??-1);
  });

  const petBlockW=3*(cw+gap)-gap;
  const petStartX=cW-petBlockW-pad;
  petAllIds.forEach((id,i)=>{
    p[id]={x:petStartX+(i%3)*(cw+gap), y:pad+Math.floor(i/3)*row};
  });

  // Skills & Tech Tree — bottom center, 1/3 from bottom
  const skillY=Math.round(cH*2/3);
  const skillsW=145, techW=145, totalW=skillsW+gap+techW;
  const skillsX=Math.round(cW/2-totalW/2);
  p['skills']  ={x:skillsX,         y:skillY};
  p['techtree']={x:skillsX+skillsW+gap, y:skillY};

  // Build Summary — centered
  p['summary']={
    x:Math.round(cW/2-SUM.w/2),
    y:Math.round(cH/2-SUM.h/2)
  };

  clampPositions();renderCards();drawLines();queueSave();
}

function clampPositions(){
  const canvas=document.getElementById('canvas');
  if(!canvas||!state.positions)return;
  const cW=canvas.clientWidth,cH=canvas.clientHeight,pad=10;
  ENTS.forEach(e=>{
    const p=state.positions[e.id];
    if(!p)return;
    const w=cardW(e,state[e.id]);
    p.x=Math.max(pad,Math.min(p.x,cW-w-pad));
    p.y=Math.max(pad,Math.min(p.y,cH-e.h-pad));
  });
  const sp=state.positions['summary'];
  if(sp){
    sp.x=Math.max(pad,Math.min(sp.x,cW-SUM.w-pad));
    sp.y=Math.max(pad,Math.min(sp.y,cH-SUM.h-pad));
  }
}

function snapToGrid(){
  const canvas=document.getElementById('canvas');
  if(!canvas)return;
  const cw=145,ch=100,gap=8,pad=10,cellW=cw+gap,cellH=ch+gap;
  const cW=canvas.clientWidth,cH=canvas.clientHeight;
  const maxCols=Math.max(1,Math.floor((cW-pad*2)/cellW));
  const maxRows=Math.max(1,Math.floor((cH-pad*2)/cellH));

  const occupied=new Set();
  function markCols(col,row,cols){for(let c=0;c<cols;c++)occupied.add(`${col+c},${row}`);}
  function isFree(col,row,cols){
    if(row>=maxRows) return false;
    if(col+cols>maxCols) return false;
    for(let c=0;c<cols;c++){if(occupied.has(`${col+c},${row}`))return false;}
    return true;
  }

  const pinned=new Set(['skills','techtree','summary']);
  const gridItems=ENTS.filter(e=>!pinned.has(e.id)).map(e=>{
    const pos=(state.positions&&state.positions[e.id])||{x:e.x,y:e.y};
    const ent=ENTS.find(x=>x.id===e.id);
    return {id:e.id,x:pos.x,y:pos.y,cols:Math.max(1,Math.round(cardW(ent,state[e.id])/cellW))};
  });
  gridItems.sort((a,b)=>{
    const ar=Math.round((a.y-pad)/cellH),br=Math.round((b.y-pad)/cellH);
    if(ar!==br) return ar-br;
    return Math.round((a.x-pad)/cellW)-Math.round((b.x-pad)/cellW);
  });

  const newPos={};

  for(const item of gridItems){
    const targetCol=Math.min(Math.max(0,Math.round((item.x-pad)/cellW)),Math.max(0,maxCols-item.cols));
    const targetRow=Math.min(Math.max(0,Math.round((item.y-pad)/cellH)),maxRows-1);
    let placed=false;
    outer:for(let r=targetRow;r<maxRows;r++){
      const startC=r===targetRow?targetCol:0;
      for(let c=startC;c<=maxCols-item.cols;c++){
        if(isFree(c,r,item.cols)){markCols(c,r,item.cols);newPos[item.id]={x:pad+c*cellW,y:pad+r*cellH};placed=true;break outer;}
      }
    }
    if(!placed){
      for(let r=0;r<maxRows;r++){
        for(let c=0;c<=maxCols-item.cols;c++){
          if(isFree(c,r,item.cols)){markCols(c,r,item.cols);newPos[item.id]={x:pad+c*cellW,y:pad+r*cellH};placed=true;break;}
        }
        if(placed)break;
      }
    }
    if(!placed) newPos[item.id]={x:Math.max(pad,Math.min(item.x,cW-item.cols*cellW-pad)),y:Math.max(pad,Math.min(item.y,cH-ch-pad))};
  }

  // Snap pinned cards (skills, techtree) to nearest grid cell within bounds
  pinned.forEach(pid=>{
    const ent=ENTS.find(e=>e.id===pid);
    if(!ent)return;
    const pos=(state.positions&&state.positions[pid])||{x:ent.x,y:ent.y};
    const c=Math.min(Math.max(0,Math.round((pos.x-pad)/cellW)),maxCols-1);
    const r=Math.min(Math.max(0,Math.round((pos.y-pad)/cellH)),maxRows-1);
    newPos[pid]={x:pad+c*cellW,y:pad+r*cellH};
  });

  // Snap summary to nearest grid cell within bounds
  const sumPos2=(state.positions&&state.positions['summary'])||{x:SUM.x,y:SUM.y};
  const sumCols=Math.max(1,Math.round(SUM.w/cellW));
  const sc2=Math.min(Math.max(0,Math.round((sumPos2.x-pad)/cellW)),Math.max(0,maxCols-sumCols));
  const sr=Math.min(Math.max(0,Math.round((sumPos2.y-pad)/cellH)),maxRows-1);
  newPos['summary']={x:pad+sc2*cellW,y:pad+sr*cellH};

  state.positions={...(state.positions||{}),...newPos};
  clampPositions();renderCards();drawLines();queueSave();
}

function layoutCleanup(){
  snapToGrid();
}

const CANVAS_W=1800, CANVAS_H=1000;
let _resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(_resizeTimer);_resizeTimer=setTimeout(()=>{clampPositions();renderCards();drawLines();fitToScreen();},150);});

let _zoom=1,_panX=0,_panY=0,_panning=false,_panStartX=0,_panStartY=0,_panOrigX=0,_panOrigY=0;
function applyZoomPan(){
  document.getElementById('canvas').style.transform=`translate(${_panX}px,${_panY}px) scale(${_zoom})`;
}
// Scale + center the fixed-size canvas so the whole board fits the visible wrap area
// (e.g. a 15" laptop viewport smaller than the 1800x1000 canvas) without manual zoom/pan.
function fitToScreen(){
  const wrapW=_wrap.clientWidth, wrapH=_wrap.clientHeight;
  if(!wrapW||!wrapH) return;
  const scale=Math.min(1,wrapW/CANVAS_W,wrapH/CANVAS_H);
  _zoom=Math.min(2,Math.max(0.3,scale));
  _panX=Math.max(0,(wrapW-CANVAS_W*_zoom)/2);
  _panY=Math.max(0,(wrapH-CANVAS_H*_zoom)/2);
  applyZoomPan();
}
const _wrap=document.getElementById('canvas-wrap');
_wrap.addEventListener('wheel',function(e){
  e.preventDefault();
  const delta=e.deltaY>0?-0.05:0.05;
  _zoom=Math.min(2,Math.max(0.3,_zoom+delta));
  if(_zoom===1){_panX=0;_panY=0;}
  applyZoomPan();
},{passive:false});
_wrap.addEventListener('mousedown',function(e){
  if(e.target.closest('.ecard')||e.button!==0) return;
  _panning=true;_panStartX=e.clientX;_panStartY=e.clientY;_panOrigX=_panX;_panOrigY=_panY;
  _wrap.style.cursor='grabbing';
  e.preventDefault();
});
window.addEventListener('mousemove',function(e){
  if(!_panning) return;
  _panX=_panOrigX+(e.clientX-_panStartX);
  _panY=_panOrigY+(e.clientY-_panStartY);
  applyZoomPan();
});
window.addEventListener('mouseup',function(){
  if(_panning){_panning=false;_wrap.style.cursor='';}
});

function backfillAscension(){
  if(!state.ascension) state.ascension=defData('ascension');
  if(!state.ascension.stars) state.ascension.stars={forge:0,pets:0,skills:0,mounts:0};
  PILLARS.forEach(p=>{if(state.ascension[p.levelKey]==null) state.ascension[p.levelKey]=1;});
  if(!state.positions) state.positions={};
  if(!state.positions.ascension) state.positions.ascension={...(DEFAULT_REF_POSITIONS.ascension||{x:440,y:680})};
}

function migrateSlotVals(){
  ENTS.forEach(e=>{
    if(['gear','mount','pet','parked'].includes(e.type)&&state[e.id])
      ensureSlotVals(state[e.id]);
  });
}

async function init(){
  initState();await loadDB();migrateSlotVals();backfillSeed();backfillAscension();
  if(state.positions&&Object.keys(state.positions).length){
    clampPositions();renderCards();drawLines();
  }else{
    autoLayout();
  }
  fitToScreen();
}
init();
</script>
