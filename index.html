<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Master — Build Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
<style>
:root {
  --surface-0: #121212;
  --surface-1: #1a1a1a;
  --surface-2: #242424;
  --border: #333333;
  --border-strong: #444444;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #777777;
  --radius: 8px;
}

body {
  margin: 0;
  background: var(--surface-0);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

/* Global input styling adapting to context variables */
input[type="text"],
input[type="number"],
select {
  background: var(--surface-0) !important;
  color: var(--text-primary) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px;
  padding: 4px 6px;
  outline: none;
}
input[type="text"]:focus,
input[type="number"]:focus,
select:focus {
  border-color: var(--theme-color, #378ADD) !important;
}
button {
  background: var(--surface-1) !important;
  color: var(--text-primary) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover {
  background: var(--surface-2) !important;
  border-color: var(--border-strong) !important;
}
input[type="checkbox"] {
  accent-color: var(--theme-color, #378ADD);
}

.ecard {
  position: absolute;
  background: var(--surface-2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.12s, height 0.2s ease-out, opacity 0.2s;
  z-index: 10;
}
.ecard:hover { border-color: var(--border-strong); }
.ecard.sel {
  border: 1.5px solid var(--theme-color, #378ADD);
  z-index: 50;
  cursor: default;
  opacity: 1 !important;
  height: auto !important;
  overflow: visible;
}
.etop { height: 2px; width: 100%; }
.tcheck { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); margin: 3px 0; cursor: pointer; }
.ss-row { display: grid; grid-template-columns: 1fr 58px 12px; gap: 4px; align-items: center; margin: 4px 0; }
</style>

</head>
<body>
<div style="padding:1rem 1rem; min-height: 100vh; user-select: none;">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px;max-width:1140px;flex-wrap:wrap;gap:6px;">
  <span style="font-size:14px;font-weight:500;color:var(--text-primary);">Build tracker — Forge Master</span>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="display:flex;gap:8px;font-size:11px;color:var(--text-muted);">
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#968DF2;margin-right:3px;vertical-align:middle;"></span>Gear</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ACC97;margin-right:3px;vertical-align:middle;"></span>Mount</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#E96B3E;margin-right:3px;vertical-align:middle;"></span>Pet</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#DCA63B;margin-right:3px;vertical-align:middle;"></span>Skills</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2982D9;margin-right:3px;vertical-align:middle;"></span>Tech</span>
    </div>
    <button onclick="resetLayout()" style="font-size:11px;padding:4px 8px;opacity:0.7;" title="Clean Up"><i class="ti ti-grid-dots" aria-hidden="true"></i> Clean Up</button>
    <button onclick="exportJSON()" style="font-size:11px;padding:4px 8px;" title="Download build as JSON"><i class="ti ti-download" aria-hidden="true"></i></button>
    <button onclick="document.getElementById('import-file').click()" style="font-size:11px;padding:4px 8px;" title="Import build from JSON"><i class="ti ti-upload" aria-hidden="true"></i></button>
    <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importJSON(event)">
    <button id="save-btn" onclick="saveAll()" style="font-size:11px;padding:4px 10px;"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save</button>
  </div>
</div>

<div id="canvas-wrap">
<div id="canvas" style="position:relative;width:1140px;height:850px;background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;overflow:visible;">
  <svg id="svg-lines" style="position:absolute;top:0;left:0;width:1140px;height:850px;pointer-events:none;"></svg>
  <div id="cards"></div>
</div>
</div>
</div>

<script>
const SS=[

function renderIcon(iconVal,col){

  return `<i class="ti ${iconVal}" style="font-size:12px;color:${col};margin-top:1px;flex-shrink:0;" aria-hidden="true"></i>`;
}

let ENTS=[

  {id:'gloves',  label:'Gloves',         type:'gear',     icon:'ti-hand-finger', x:145, y:10,  w:127,h:106},

  {id:'body',    label:'Body',           type:'gear',     icon:'ti-shield',      x:415, y:10,  w:127,h:106},
  {id:'necklace',label:'Necklace',       type:'gear',     icon:'ti-link',        x:550, y:10,  w:127,h:106},
  {id:'ring',    label:'Ring',           type:'gear',     icon:'ti-circle',      x:685, y:10,  w:127,h:106},
  {id:'boots',   label:'Boots',          type:'gear',     icon:'ti-arrow-up',    x:820, y:10,  w:127,h:106},
  {id:'pelvic',  label:'Pelvic Harness', type:'gear',     icon:'ti-adjustments', x:955, y:10,  w:127,h:106},

  // Row 1 (y=124) — 2 mounts, 3 inventory, 3 pets (pets on right)
  {id:'mount1',  label:'Ride 1',         type:'mount',    icon:'ti-star',        x:10,  y:124, w:127,h:106},
  {id:'mount2',  label:'Ride 2',         type:'mount',    icon:'ti-star-half',   x:145, y:124, w:127,h:106},
  {id:'inv1',    label:'Inventory 1',    type:'parked',   icon:'ti-archive',     x:280, y:124, w:127,h:106},
  {id:'inv2',    label:'Inventory 2',    type:'parked',   icon:'ti-archive',     x:415, y:124, w:127,h:106},
  {id:'inv3',    label:'Inventory 3',    type:'parked',   icon:'ti-archive',     x:550, y:124, w:127,h:106},
  {id:'pet1',    label:'Pet 1',          type:'pet',      icon:'ti-heart',       x:685, y:124, w:127,h:106},
  {id:'pet2',    label:'Pet 2',          type:'pet',      icon:'ti-heart',       x:820, y:124, w:127,h:106},
  {id:'pet3',    label:'Pet 3',          type:'pet',      icon:'ti-heart',       x:955, y:124, w:127,h:106},

  // Row 2 (y=238) — 5 inventory
  {id:'inv4',    label:'Inventory 4',    type:'parked',   icon:'ti-archive',     x:10,  y:238, w:127,h:106},
  {id:'inv5',    label:'Inventory 5',    type:'parked',   icon:'ti-archive',     x:145, y:238, w:127,h:106},
  {id:'inv6',    label:'Inventory 6',    type:'parked',   icon:'ti-archive',     x:280, y:238, w:127,h:106},
  {id:'inv7',    label:'Inventory 7',    type:'parked',   icon:'ti-archive',     x:415, y:238, w:127,h:106},
  {id:'inv8',    label:'Inventory 8',    type:'parked',   icon:'ti-archive',     x:550, y:238, w:127,h:106},

  {id:'skills',  label:'Skills',         type:'skills',   icon:'ti-bolt',        x:10,  y:352, w:112,h:116},
  {id:'techtree',label:'Tech Tree',      type:'techtree', icon:'ti-sitemap',     x:145, y:352, w:112,h:116},
];
const SUM={x:403,y:567,w:334,h:200};

const SEED={
  weapon:   {name:'Plasma Rifle',        level:81,  rarity:'Interstellar', slots:['doubleChance','healthRegen'], substats:{doubleChance:16.2, healthRegen:3.65}},
  gloves:   {name:'Rainbow Gloves',      level:10,  rarity:'Multiverse',   slots:['lifesteal','health'],         substats:{lifesteal:19.7,    health:10.1}},
  helmet:   {name:'Mask',                level:17,  rarity:'Multiverse',   slots:['atkSpeed','rangedDmg'],       substats:{atkSpeed:33,       rangedDmg:11.7}},
  body:     {name:'Plasma Suit',         level:112, rarity:'Interstellar', slots:['doubleChance','cooldown'],    substats:{doubleChance:19.3, cooldown:2.46}},
  necklace: {name:'Psi Choker',          level:45,  rarity:'Interstellar', slots:['cooldown','lifesteal'],       substats:{cooldown:4.02,     lifesteal:19.6}},
  ring:     {name:'Connection Ring',     level:25,  rarity:'Multiverse',   slots:['health','doubleChance'],      substats:{health:12.7,       doubleChance:17.6}},
  boots:    {name:'Ethereal Socks',      level:49,  rarity:'Multiverse',   slots:['lifesteal','critChance'],     substats:{lifesteal:6.71,    critChance:6.33}},
  pelvic:   {name:'Pelvic Synchronizer', level:106, rarity:'Interstellar', slots:['doubleChance','lifesteal'],   substats:{doubleChance:18.6, lifesteal:16}},
  
  pet1:     {name:'Electry',             level:16,  rarity:'Ultimate',     slots:['doubleChance','meleeDmg'],    substats:{doubleChance:12.9, meleeDmg:1.22}},
  pet2:     {name:'Electry',             level:11,  rarity:'Ultimate',     slots:['doubleChance','critDmg'],     substats:{doubleChance:18.7, critDmg:12}},
  pet3:     {name:'Serpent',             level:20,  rarity:'Legendary',    slots:['cooldown','doubleChance'],    substats:{cooldown:6.46,     doubleChance:14.2}},
  
  mount1:   {name:'Lily Pad',            level:12,  rarity:'Common',       slots:['health','atkSpeed'],          substats:{health:1.21,       atkSpeed:31.2}},
  mount2:   {name:'Brown Leaf',          level:13,  rarity:'Common',       slots:['lifesteal','rangedDmg'],      substats:{lifesteal:16.8,    rangedDmg:11}},

  // Pre-loaded benched items
  inv1:     {name:'Brown Leaf',          level:1,   rarity:'Common',       slots:['critDmg','atkSpeed'],         substats:{critDmg:75.8,      atkSpeed:18.7}},
  inv2:     {name:'Treant',              level:6,   rarity:'Ultimate',     slots:['critDmg','doubleChance'],     substats:{critDmg:79.7,      doubleChance:1.42}},
  inv3:     {name:'Enchanted Elk',       level:1,   rarity:'Ultimate',     slots:['health','critChance'],        substats:{health:7.92,       critChance:11.9}},
  inv4:     {name:'Enchanted Elk',       level:1,   rarity:'Ultimate',     slots:['dmg','block'],                substats:{dmg:6.96,          block:2.78}},
  inv5:     {name:'Cerberus',            level:26,  rarity:'Legendary',    slots:['dmg','atkSpeed'],             substats:{dmg:5.61,          atkSpeed:33.4}},
  inv6:     {name:'Cerberus',            level:25,  rarity:'Legendary',    slots:['doubleChance','health'],      substats:{doubleChance:19.2, health:6.73}},
  inv7:     {name:'Kitsune',             level:24,  rarity:'Legendary',    slots:['critChance','lifesteal'],     substats:{critChance:6.65,   lifesteal:16.8}},
  inv8:     {name:'Serpent',             level:1,   rarity:'Legendary',    slots:['dmg','doubleChance'],         substats:{dmg:12.5,          doubleChance:16.5}},
};

let state={}, selId=null, db=null, _saveTimer=null;
function queueSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>{if(db)saveAll();},800);}

function defData(id){
  const e=ENTS.find(e=>e.id===id);
  if(e.type==='skills') return {slots:Array(5).fill(0).map(()=>({name:'',level:1,stype:'Active'}))};
  if(e.type==='techtree') return {nodes:{}};
  const d={name:'',imageUrl:'',level:1,rarity:'',damage:0,hp:0,status:e.type==='parked'?'parked':'equipped',activeSlots:[SS[0].k,SS[1].k],substats:{}};
  SS.forEach(s=>d.substats[s.k]=0);
  if(e.type==='mount' || e.type==='pet' || e.type==='parked') d.rarity='Common';
  return d;
}

function initState(){
  ENTS.forEach(e=>{
    state[e.id]=defData(e.id);
    const s=SEED[e.id];
    if(!s) return;
    ['name','level','rarity','imageUrl','damage','hp','status'].forEach(f=>{if(s[f]!==undefined)state[e.id][f]=s[f];});
    if(s.substats) Object.assign(state[e.id].substats, s.substats);
    if(s.slots) state[e.id].activeSlots=s.slots;
  });
}

async function openDB(){
  return new Promise((res,rej)=>{
    // Incremented to v9 for the new inventory system
    const r=indexedDB.open('forge-master-v9',1);
    r.onupgradeneeded=ev=>ev.target.result.createObjectStore('items',{keyPath:'id'});
    r.onsuccess=ev=>res(ev.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function loadDB(){
  try{
    db=await openDB();
    const tx=db.transaction('items','readonly'),st=tx.objectStore('items');
    // load dynamic ent definitions first so their state loads correctly
    await new Promise(res=>{
      const r=st.get('_dynEnts');
      r.onsuccess=()=>{
        if(r.result?.data) r.result.data.forEach(e=>{
          if(!ENTS.find(x=>x.id===e.id)){
            // refresh w/h from the current base card of same type so size changes propagate
            const base=ENTS.find(x=>x.type===e.type&&!x._dynamic);
            if(base){e.w=base.w;e.h=base.h;}
            ENTS.push(e);
          }
        });
        res();
      };
      r.onerror=()=>res();
    });
    await Promise.all([...ENTS.map(e=>new Promise(res=>{
      const r=st.get(e.id);
      r.onsuccess=()=>{if(r.result)state[e.id]=r.result.data;res();};
      r.onerror=()=>res();
    })),new Promise(res=>{
      const r=st.get('_positions');
      r.onsuccess=()=>{if(r.result)state.positions=r.result.data;res();};
      r.onerror=()=>res();
    })]);
  }catch(err){db=null;}
}
async function saveAll(){
  const btn=document.getElementById('save-btn');
  if(!db){btn.textContent='No DB';setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> Save';},2000);return;}
  const tx=db.transaction('items','readwrite'),st=tx.objectStore('items');
  ENTS.forEach(e=>st.put({id:e.id,data:state[e.id]}));
  st.put({id:'_positions',data:state.positions||{}});
  st.put({id:'_dynEnts',data:ENTS.filter(e=>e._dynamic)});
  await new Promise(res=>{tx.oncomplete=res;tx.onerror=res;});
  btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Saved';
  setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> Save';},1500);
}

function fmtVal(v){return Math.round(v*10)/10;}

function entPos(e){
  const p=state.positions&&state.positions[e.id];
  return p?{x:p.x,y:p.y}:{x:e.x,y:e.y};
}
function sumPos(){
  const p=state.positions&&state.positions['summary'];
  return p?{x:p.x,y:p.y}:{x:SUM.x,y:SUM.y};
}
function drawLines(){
  const sp=sumPos(),sc={x:sp.x+SUM.w/2,y:sp.y+SUM.h/2};
  let h='';
  document.getElementById('svg-lines').innerHTML=h;
}

function totals(){
  const t={damage:0,hp:0};SS.forEach(s=>t[s.k]=0);
  ENTS.filter(e=>['gear','mount','pet','parked'].includes(e.type)).forEach(e=>{
    const d=state[e.id];
    if(!d || d.status==='parked') return;
    if(d.substats)SS.forEach(s=>{t[s.k]+=(parseFloat(d.substats[s.k])||0);});
    t.damage+=(parseFloat(d.damage)||0);
    t.hp+=(parseFloat(d.hp)||0);
  });
  return t;
}

function cardBody(e,d,isSel){
  if(isSel) return makeInlineEditor(e,d);

  if(e.type==='skills'){
    const slots=d.slots||[],filled=slots.filter(s=>s.name&&s.name.trim()).length;
    const names=slots.filter(s=>s.name&&s.name.trim()).slice(0,3).map(s=>`<div style="font-size:10px;color:var(--text-secondary);padding:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.name} <span style="font-weight:500;color:var(--text-primary);">Lv${s.level}</span></div>`).join('');
    return `<div style="padding:3px 9px 8px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;">${filled}/5 configured</div>${names||'<div style="font-size:10px;color:var(--text-muted);font-style:italic;">tap to edit</div>'}</div>`;
  }
  if(e.type==='techtree'){
    const nodes=d.nodes||{},unlocked=TN.filter(n=>nodes[n.id]).length;
    const groups=[...new Set(TN.map(n=>n.g))];
    const lines=groups.map(g=>{const gn=TN.filter(n=>n.g===g),done=gn.filter(n=>nodes[n.id]).length,full=done===gn.length;return `<div style="font-size:10px;color:${full?'#2ACC97':'var(--text-secondary)'};padding:1px 0;">${g}: ${done}/${gn.length}${full?' ✓':''}</div>`;}).join('');
    return `<div style="padding:3px 9px 8px;"><div style="height:3px;background:var(--surface-0);border-radius:2px;overflow:hidden;margin-bottom:5px;"><div style="width:${Math.min(100,(unlocked/TN.length)*100)}%;height:100%;background:#185FA5;border-radius:2px;"></div></div>${lines}</div>`;
  }

  const active = d.activeSlots || [SS[0].k,SS[1].k];
  const sortedSlots = [...active].sort((a,b) => {
    const valA = parseFloat((d.substats || {})[a]) || 0;
    const valB = parseFloat((d.substats || {})[b]) || 0;
    return valB - valA;
  });

  const t = ((d.status||'equipped')==='parked' && !isSel) ? totals() : null;

  let baseRows='';
  const dmgV=parseFloat(d.damage)||0, hpV=parseFloat(d.hp)||0;
  if(dmgV>0||hpV>0){
    baseRows=`<div style="display:flex;gap:8px;font-size:10px;color:var(--text-secondary);padding:1px 0;margin-bottom:2px;">`
      +(dmgV>0?`<span>⚔ <span style="font-weight:500;color:var(--text-primary);">${fmtVal(dmgV)}</span></span>`:'')
      +(hpV>0?`<span>♥ <span style="font-weight:500;color:var(--text-primary);">${fmtVal(hpV)}</span></span>`:'')
      +`</div>`;
  }

  const rows=sortedSlots.map(k=>{
    const s=SS.find(ss=>ss.k===k),v=parseFloat((d.substats||{})[k])||0;
    if(!s) return '';
    let delta='';
    if(t && v>0 && s.tgt){
      const cur=fmtVal(t[k]),gap=fmtVal(s.tgt-cur);
      if(gap>0) delta=`<span style="font-size:8px;color:#2ACC97;margin-left:3px;" title="Build needs ${gap}% more ${s.l}">▲</span>`;
    }
    return `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);padding:1px 0;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">${s.l}${delta}</span><span style="font-weight:500;color:${v>0?'var(--text-primary)':'var(--text-muted)'};flex-shrink:0;margin-left:4px;">${v>0?fmtVal(v)+'%':'—'}</span></div>`;
  }).join('');
  return `<div style="padding:3px 9px 8px;">${baseRows}${rows}</div>`;
}

function ssOptions(selectedKey){
  return SS.map(s=>`<option value="${s.k}"${s.k===selectedKey?' selected':''}>${s.l} (max ${s.max}%)</option>`).join('');
}

function makeInlineEditor(e,d){
  let content = '';
  const isMount=e.type==='mount', isPet=e.type==='pet', isParked=e.type==='parked';
  if(e.type==='skills'){
    const slots=d.slots||Array(5).fill(0).map(()=>({name:'',level:1,stype:'Active'}));
    content=`<div style="font-size:10px;font-weight:500;color:var(--text-secondary);margin:4px 0 2px;">Slots</div>`
      +slots.map((sk,i)=>`<div style="display:grid;grid-template-columns:1fr 34px;gap:4px;margin:3px 0;align-items:center;">
        <input type="text" placeholder="Skill ${i+1}" value="${sk.name||''}" onchange="updSkill(${i},'name',this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;">
        <input type="number" value="${sk.level||1}" min="1" max="99" onchange="updSkill(${i},'level',+this.value)" style="font-size:10px;padding:2px 2px;text-align:center;">
      </div>`).join('');
  } else if(e.type==='techtree'){
    const nodes=d.nodes||{};
    content=`<div style="font-size:9px;color:var(--text-muted);margin:4px 0 6px;">Skip Skill DMG nodes</div>`;
    content+=TN.map(n=>`<label class="tcheck" style="gap:4px;font-size:10px;margin:2px 0;"><input type="checkbox" ${nodes[n.id]?'checked':''} onchange="updTechNode('${n.id}',this.checked)" style="margin:0;transform:scale(0.85);"><span>${n.l}</span></label>`).join('');
  } else {
    const rarList=e.type==='gear'?GEAR_RARITIES:PARKED_RARITIES;
    const active=d.activeSlots||[SS[0].k,SS[1].k];

    const ssRows=active.map((k,i)=>{
      const v=fmtVal(parseFloat(d.substats[k])||0);
      return `<div style="margin:3px 0;">
        <select onchange="updSlot('${e.id}',${i},this.value)" style="font-size:9px;padding:2px 4px;width:100%;box-sizing:border-box;">${ssOptions(k)}</select>
        <div style="display:flex;align-items:center;gap:3px;margin-top:2px;">
          <input type="number" step="0.1" min="0" value="${v}" placeholder="0" oninput="updStatVal('${e.id}','${k}',+this.value)" id="ssval-${e.id}-${i}" style="font-size:10px;padding:2px 4px;text-align:right;width:50px;min-width:0;box-sizing:border-box;">
          <span style="font-size:9px;color:var(--text-muted);flex-shrink:0;">%</span>
        </div>
      </div>`;
    }).join('');

    let swapHTML = '';

    content=`
      <div style="margin-top:6px;display:grid;grid-template-columns:1fr 42px;gap:4px;">
        <input type="text" placeholder="Item Name" value="${d.name||''}" onchange="updField('${e.id}','name',this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;">
        <input type="number" placeholder="Lv" value="${d.level||1}" min="1" onchange="updField('${e.id}','level',+this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:center;">
      </div>
      <div style="margin-top:4px;">
        <select onchange="updField('${e.id}','rarity',this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;">
          ${rarList.map(r=>`<option value="${r}"${d.rarity===r?' selected':''}>${r||'— Rarity —'}</option>`).join('')}
        </select>
      </div>
      <div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">⚔</span>
          <input type="number" step="1" min="0" placeholder="DMG" value="${d.damage||0}" oninput="updField('${e.id}','damage',+this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
        <div style="display:flex;align-items:center;gap:3px;">
          <span style="font-size:10px;color:var(--text-muted);">♥</span>
          <input type="number" step="1" min="0" placeholder="HP" value="${d.hp||0}" oninput="updField('${e.id}','hp',+this.value)" style="font-size:10px;padding:2px 4px;width:100%;box-sizing:border-box;text-align:right;">
        </div>
      </div>
      <div style="font-size:10px;font-weight:500;color:var(--text-secondary);margin:6px 0 2px;">Substats</div>
      ${ssRows}
      ${swapHTML}`;
  }

  const curStatus=(d.status||'equipped');
  const showStatus=isMount||isPet||isParked;
  const statusBtns=showStatus?`
    <div style="display:flex;gap:4px;margin-top:4px;">
      <button onclick="updField('${e.id}','status','equipped')" style="font-size:9px;padding:2px 6px;flex:1;${curStatus==='equipped'?'background:#2ACC97;color:#fff;border-color:#2ACC97;font-weight:600;':'opacity:0.55;'}">Equipped</button>
      <button onclick="updField('${e.id}','status','parked')" style="font-size:9px;padding:2px 6px;flex:1;${curStatus==='parked'?'background:#666;color:#fff;border-color:#666;font-weight:600;':'opacity:0.55;'}">Parked</button>
    </div>`:'';
  return `<div style="padding:2px 9px 8px;" onclick="event.stopPropagation();">
    ${content}
    ${statusBtns}
    <div style="display:flex;gap:4px;margin-top:6px;justify-content:space-between;">
      <button onclick="deleteEnt('${e.id}')" style="font-size:9px;padding:2px 8px;background:#5c1a1a !important;color:#f87171 !important;border-color:#7f1d1d !important;">Delete</button>
      <button onclick="dupEnt('${e.id}')" style="font-size:9px;padding:2px 6px;" title="Duplicate"><i class="ti ti-copy" aria-hidden="true"></i></button>
    </div>
  </div>`;
}

function renderCards(){
  const t=totals();let h='';
  ENTS.forEach(e=>{
    const d=state[e.id]||defData(e.id),col=COL[e.type],isSel=selId===e.id;
    const isStatEnt=['gear','mount','pet','parked'].includes(e.type);
    const title=isStatEnt&&d.name?d.name:e.label;
    const lv=d.level?` Lv.${d.level}`:'';
    const isParked=(d.status||'equipped')==='parked';
    const statusFooter=isStatEnt&&!isSel
      ?(isParked
        ?`<div style="position:absolute;bottom:0;left:0;right:0;height:14px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;"><span style="font-size:7px;letter-spacing:1px;font-weight:600;color:#666;">PARKED</span></div>`
        :`<div style="position:absolute;bottom:0;left:0;right:0;height:14px;background:#0f2a1a;display:flex;align-items:center;justify-content:center;"><span style="font-size:7px;letter-spacing:1px;font-weight:600;color:#2ACC97;">EQUIPPED</span></div>`)
      :'';
    let subtitle='';
    if(e.type==='gear'&&d.name) subtitle=e.label+(d.rarity?` · ${d.rarity}`:'');
    else if(e.type==='gear'&&d.rarity) subtitle=d.rarity;
    else if((e.type==='mount'||e.type==='pet'||e.type==='parked')&&(d.rarity||d.level)) subtitle=`${d.rarity||''}${lv}`;
    const tcol=d.rarity&&RARITY_COL[d.rarity]?RARITY_COL[d.rarity]:col;
    
    const opacityStyle = (isParked && !isSel) ? 'opacity: 0.65;' : '';

    let calcHeight = e.h;
    if(isSel) {
      if(e.type==='skills') calcHeight = 210;
      else if(e.type==='techtree') calcHeight = 240;
      else if(e.type==='gear') calcHeight = 218;
      else calcHeight = 254;
    }

    const pos=state.positions&&state.positions[e.id]?state.positions[e.id]:{x:e.x,y:e.y};
    h+=`<div class="ecard ${e.type}${isSel?' sel':''}" data-eid="${e.id}" style="left:${pos.x}px;top:${pos.y}px;width:${e.w}px;height:${calcHeight}px;--theme-color:${tcol};${opacityStyle};cursor:pointer;" onmousedown="startDrag(event,'${e.id}')" onclick="cardClick(event,'${e.id}')">
      <div class="etop" style="background:${tcol};"></div>
      <div style="padding:5px 9px 2px;display:flex;align-items:flex-start;gap:5px;position:relative;">
        ${renderIcon(itemIcon(e,d),tcol)}
        <div style="overflow:hidden;min-width:0;flex:1;">
          <div style="font-size:11px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}${!d.name&&e.type==='gear'&&lv?lv:''}</div>
          ${subtitle?`<div style="font-size:9px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${subtitle}</div>`:''}
        </div>
        ${isSel?`<button onclick="closeEdit(event)" style="font-size:11px;padding:0 5px;line-height:17px;border-radius:3px;flex-shrink:0;opacity:0.7;" title="Close">×</button>`:''}
      </div>
      ${cardBody(e,d,isSel)}
      ${statusFooter}
    </div>`;
  });
  const isSumSel=selId==='summary';
  // Split substats: those with a target get horizontal rows; the rest get a vertical bar chart
  const mainSS=SS.filter(s=>s.tgt);
  const restSS=SS.filter(s=>!s.tgt);
  const mainRows=mainSS.map(s=>{
    const v=parseFloat(t[s.k])||0;
    const pct=Math.min(100,(v/s.tgt)*100);
    const met=v>=s.tgt;
    const bc=met?'#2ACC97':v>s.tgt*0.55?'#DCA63B':'#E96B3E';
    return `<div style="display:grid;grid-template-columns:90px 1fr 48px 60px;gap:6px;align-items:center;padding:4px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:11px;color:var(--text-secondary);">${s.l}</span>
      <div style="height:4px;background:var(--surface-0);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${bc};border-radius:2px;transition:width 0.3s;"></div></div>
      <span style="font-size:11px;font-weight:500;color:${met?'#2ACC97':'var(--text-primary)'};text-align:right;">${fmtVal(v)}%${met?' ✓':''}</span>
      <span style="font-size:10px;color:var(--text-muted);">${s.tl}</span>
    </div>`;
  }).join('');
  const CHART_H=52;
  const restVals=restSS.map(s=>parseFloat(t[s.k])||0);
  const globalMax=Math.max(...restVals,1);
  const vertBars=restSS.map((s,i)=>{
    const v=restVals[i];
    const pct=Math.min(100,(v/globalMax)*100);
    const barH=Math.max(v>0?2:0,Math.round((pct/100)*CHART_H));
    const abbr=s.l.replace(' Chance','C').replace(' Speed','Spd').replace(' DMG','D').replace(' Regen','Rgn').replace('Ranged','Rng').replace('Melee','Mle').replace('Skill','Skl');
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;min-width:0;">
      <span style="font-size:7px;font-weight:500;color:var(--text-primary);">${v>0?fmtVal(v):''}</span>
      <div style="height:${CHART_H}px;display:flex;align-items:flex-end;width:100%;">
        <div style="width:100%;height:${barH}px;background:#378ADD;border-radius:2px 2px 0 0;transition:height 0.3s;"></div>
      </div>
      <div style="height:1px;width:100%;background:var(--border);"></div>
      <span style="font-size:7px;color:var(--text-muted);text-align:center;line-height:1.1;">${abbr}</span>
    </div>`;
  }).join('');
  const sumPos=state.positions&&state.positions["summary"]?state.positions["summary"]:{x:SUM.x,y:SUM.y};
  h+=`<div class="ecard summary${isSumSel?' sel':''}" data-eid="summary" style="left:${sumPos.x}px;top:${sumPos.y}px;width:${SUM.w}px;height:${SUM.h}px;cursor:pointer;" onmousedown="startDrag(event,'summary')" onclick="cardClick(event,'summary')">
    <div class="etop" style="background:#378ADD;"></div>
    <div style="padding:6px 12px 4px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:5px;">
        <i class="ti ti-chart-bar" style="font-size:12px;color:#378ADD;" aria-hidden="true"></i>
        <span style="font-size:11px;font-weight:500;color:var(--text-primary);">Build summary</span>
      </div>
      <div style="display:flex;gap:10px;font-size:10px;color:var(--text-secondary);">
        <span>⚔ <span style="font-weight:600;color:var(--text-primary);">${fmtVal(t.damage)||'—'}</span></span>
        <span>♥ <span style="font-weight:600;color:var(--text-primary);">${fmtVal(t.hp)||'—'}</span></span>
      </div>
    </div>
    <div style="padding:0 12px 4px;">${mainRows}</div>
    <div style="padding:4px 8px 8px;display:flex;gap:3px;align-items:flex-end;">${vertBars}</div>
  </div>`;
  document.getElementById('cards').innerHTML=h;
}

function renderSummaryRows(){
  const t=totals();let h='';
  h+=`<div style="display:flex;gap:20px;padding:6px 0 8px;border-bottom:0.5px solid var(--border);margin-bottom:4px;">
    <div style="font-size:12px;color:var(--text-secondary);">⚔ Total DMG <span style="font-weight:600;color:var(--text-primary);margin-left:4px;">${fmtVal(t.damage)}</span></div>
    <div style="font-size:12px;color:var(--text-secondary);">♥ Total HP <span style="font-weight:600;color:var(--text-primary);margin-left:4px;">${fmtVal(t.hp)}</span></div>
  </div>`;
  SS.forEach(s=>{
    const v=fmtVal(t[s.k]),pct=s.tgt?Math.min(100,(v/s.tgt)*100):Math.min(100,(v/s.max)*50),met=s.tgt&&v>=s.tgt,bc=met?'#2ACC97':s.tgt&&v>s.tgt*0.55?'#DCA63B':'#378ADD';
    h+=`<div style="display:grid;grid-template-columns:110px 1fr 56px ${s.tgt?'80px':'0'};gap:8px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:12px;color:var(--text-secondary);">${s.l}</span>
      <div style="height:4px;background:var(--surface-0);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${bc};border-radius:2px;transition:width 0.3s;"></div></div>
      <span style="font-size:12px;font-weight:500;color:${met?'#2ACC97':'var(--text-primary)'};text-align:right;">${v}%${met?' ✓':''}</span>
      ${s.tgt?`<span style="font-size:10px;color:var(--text-muted);">${s.tl}</span>`:''}
    </div>`;
  });
  document.getElementById('summary-rows').innerHTML=h;
}

function selEnt(id){
  if(selId === id) return;
  selId=id;
  renderCards();
}

function cardClick(ev,id){
  if(_dragMoved){_dragMoved=false;return;}
  ev.stopPropagation();
  selEnt(id);
}

function closeEdit(e){
  if(e) e.stopPropagation();
  selId=null;
  renderCards();
}

function updSlot(id,slotIdx,newKey){
  const d=state[id];
  const oldKey=d.activeSlots[slotIdx];
  d.substats[oldKey]=0;
  d.activeSlots[slotIdx]=newKey;
  renderCards();queueSave();
}

function updStatVal(id,key,val){
  state[id].substats[key]=isNaN(val)?0:val;
  queueSave();
}

function updField(id,f,v){
  state[id][f]=v;
  if(f==='status'&&v==='equipped'){
    const ent=ENTS.find(e=>e.id===id);
    if(ent?.type==='mount'){
      // only one mount equipped at a time
      ENTS.filter(e=>e.type==='mount'&&e.id!==id).forEach(e=>{state[e.id].status='parked';});
    } else if(ent?.type==='pet'){
      // only three pets equipped at a time — park the first equipped one if over limit
      const equipped=ENTS.filter(e=>e.type==='pet'&&e.id!==id&&(state[e.id].status||'equipped')==='equipped');
      if(equipped.length>=3) state[equipped[0].id].status='parked';
    }
  }
  renderCards();
  queueSave();
}

function updSkill(i,f,v){
  if(!state.skills.slots) state.skills.slots=Array(5).fill(0).map(()=>({name:'',level:1,stype:'Active'}));
  state.skills.slots[i][f]=v;
  renderCards();queueSave();
}

function updTechNode(nid,checked){
  if(!state.techtree.nodes) state.techtree.nodes={};
  state.techtree.nodes[nid]=checked;
  queueSave();
}

function clearEnt(id){
  state[id]=defData(id);
  renderCards();queueSave();
}

function dupEnt(srcId){
  const srcEnt=ENTS.find(e=>e.id===srcId);
  if(!srcEnt) return;
  const newId=srcEnt.type+'_'+Date.now();
  const srcPos=(state.positions&&state.positions[srcId])||{x:srcEnt.x,y:srcEnt.y};
  // place to the right; if it would overflow canvas width, place below instead
  let newX=snap(srcPos.x+srcEnt.w+8), newY=snap(srcPos.y);
  if(newX+srcEnt.w>1140){newX=snap(srcPos.x);newY=snap(srcPos.y+srcEnt.h+8);}
  const newEnt={id:newId,label:srcEnt.label,type:srcEnt.type,icon:srcEnt.icon,x:newX,y:newY,w:srcEnt.w,h:srcEnt.h,_dynamic:true};
  ENTS.push(newEnt);
  state[newId]=JSON.parse(JSON.stringify(state[srcId]));
  if(!state.positions)state.positions={};
  state.positions[newId]={x:newX,y:newY};
  renderCards();saveAll();
}

function deleteEnt(id){
  const ent=ENTS.find(e=>e.id===id);
  if(ent?._dynamic){
    // remove dynamic card entirely
    ENTS=ENTS.filter(e=>e.id!==id);
    delete state[id];
    if(state.positions) delete state.positions[id];
  } else {
    // static slot: just clear data
    state[id]=defData(id);
  }
  selId=null;
  renderCards();saveAll();
}

function swapEnts(id1){
  const id2 = document.getElementById('swap-' + id1).value;
  if(!id2 || id1 === id2) return;
  
  // Deep copy states to swap cleanly
  const temp = JSON.parse(JSON.stringify(state[id1]));
  state[id1] = JSON.parse(JSON.stringify(state[id2]));
  state[id2] = temp;
  
  renderCards();
  
  saveAll();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`forge-master-build-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importJSON(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const imported=JSON.parse(reader.result);
      ENTS.forEach(e=>{if(imported[e.id])state[e.id]=imported[e.id];});
      if(imported.positions) state.positions=imported.positions;
      renderCards();saveAll();
    }catch(err){alert('Invalid JSON file');}
  };
  reader.readAsText(file);
  ev.target.value='';
}

document.addEventListener('click',function(e){
  if(!selId) return;
  if(e.target.closest('.ecard.sel')) return;
  selId=null;renderCards();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&selId){selId=null;renderCards();}
});

// --- Free drag (move) / click to edit ---
const GRID=8;
function snap(v){return Math.round(v/GRID)*GRID;}

let _drag=null, _dragMoved=false;
function startDrag(ev,id){
  if(ev.button!==0)return;
  const e=ENTS.find(e=>e.id===id);
  const defPos=e?{x:e.x,y:e.y}:(id==='summary'?{x:SUM.x,y:SUM.y}:{x:0,y:0});
  const cur=(state.positions&&state.positions[id])||defPos;
  _drag={id,startX:ev.clientX,startY:ev.clientY,origX:cur.x,origY:cur.y,moved:false};
}
document.addEventListener('mousemove',function(ev){
  if(!_drag)return;
  const dx=ev.clientX-_drag.startX,dy=ev.clientY-_drag.startY;
  if(!_drag.moved&&Math.abs(dx)<5&&Math.abs(dy)<5)return;
  _drag.moved=true;
  const newX=snap(Math.max(0,_drag.origX+dx)),newY=snap(Math.max(0,_drag.origY+dy));
  const el=document.querySelector(`[data-eid="${_drag.id}"]`);
  if(el){el.style.left=newX+'px';el.style.top=newY+'px';}
  if(!state.positions)state.positions={};
  state.positions[_drag.id]={x:newX,y:newY};
});
document.addEventListener('mouseup',function(ev){
  if(!_drag)return;
  if(_drag.moved){
    if(!state.positions)state.positions={};
    state.positions[_drag.id]={
      x:snap(Math.max(0,_drag.origX+(ev.clientX-_drag.startX))),
      y:snap(Math.max(0,_drag.origY+(ev.clientY-_drag.startY)))
    };
    _dragMoved=true;
    _drag=null;
    drawLines();queueSave();
  } else {
    _drag=null;
    // cardClick on the card will fire next and handle selection
  }
});
function resetLayout(){
  const GAP=8, MARGIN=10;
  const cellW=135, cellH=114; // card w/h + gap (127+8, 106+8)
  const maxCols=Math.floor((1140-MARGIN)/cellW);

  // Find each card's nearest grid cell based on current position
  const cards=ENTS.map(e=>{
    const pos=(state.positions&&state.positions[e.id])||{x:e.x,y:e.y};
    return {e, col:Math.max(0,Math.round((pos.x-MARGIN)/cellW)), row:Math.max(0,Math.round((pos.y-MARGIN)/cellH))};
  });

  // Assign cells, resolving collisions by scanning forward in reading order
  const occupied=new Set();
  const newPos={};
  for(const c of cards){
    let {col,row}=c;
    let placed=false;
    for(let r=row;r<row+40&&!placed;r++){
      for(let cc=(r===row?col:0);cc<maxCols&&!placed;cc++){
        if(!occupied.has(`${cc},${r}`)){col=cc;row=r;placed=true;}
      }
    }
    occupied.add(`${col},${row}`);
    newPos[c.e.id]={x:MARGIN+col*cellW,y:MARGIN+row*cellH};
  }
  newPos['summary']={x:SUM.x,y:SUM.y};
  state.positions=newPos;
  renderCards();drawLines();queueSave();
}

async function init(){
  initState();await loadDB();
  // reset summary to centred 2/3-down position, overriding any stale saved position
  if(!state.positions)state.positions={};
  state.positions['summary']={x:SUM.x,y:SUM.y};
  drawLines();renderCards();
}
init();
</script>
</body>
