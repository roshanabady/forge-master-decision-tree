document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a43dd991-9a0d-43cf-9ab6-aef2eed88d78\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n\n<helmet>\n  <style>\n    * { box-sizing: border-box; }\n    body { margin: 0; background: #121212; overflow: hidden;\n           font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }\n    ::-webkit-scrollbar { width: 4px; }\n    ::-webkit-scrollbar-track { background: #1a1a1a; }\n    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100vw;height:100vh;background:#121212;overflow:hidden;position:relative;\">\n\n  <!-- TOP BAR -->\n  <div style=\"position:absolute;top:0;left:0;right:0;height:44px;background:#1a1a1a;border-bottom:0.5px solid #333;display:flex;align-items:center;padding:0 18px;z-index:100;gap:14px;\">\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <div style=\"width:7px;height:7px;border-radius:50%;background:#968DF2;\"><\u002Fdiv>\n      <span style=\"font-size:13px;font-weight:500;color:#fff;\">Forge Master<\u002Fspan>\n      <span style=\"font-size:11px;color:#555;\">build tracker<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;font-size:11px;color:#555;margin-left:8px;\">\n      <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#968DF2;display:inline-block;\"><\u002Fspan>Gear<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#2ACC97;display:inline-block;\"><\u002Fspan>Mount<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#E96B3E;display:inline-block;\"><\u002Fspan>Pet<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#DCA63B;display:inline-block;\"><\u002Fspan>Skills<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#2982D9;display:inline-block;\"><\u002Fspan>Tech<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <span style=\"font-size:10px;color:#444;\">scroll to zoom · drag header to move<\u002Fspan>\n    <button onclick=\"{{ resetLayout }}\" style=\"padding:4px 10px;background:#242424;border:0.5px solid #333;border-radius:6px;color:#b3b3b3;font-size:11px;cursor:pointer;\" style-hover=\"background:#2e2e2e;border-color:#444;\">Reset layout<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- CANVAS -->\n  <div id=\"fm-canvas\" style=\"position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;cursor:{{ canvasCursor }};background-color:#121212;background-image:radial-gradient(circle,#2a2a2a 1px,transparent 1px);background-size:28px 28px;\" onmousedown=\"{{ onMD }}\" onmousemove=\"{{ onMM }}\" onmouseup=\"{{ onMU }}\" onmouseleave=\"{{ onMU }}\">\n\n    <div style=\"{{ canvasStyle }}\" data-bg=\"1\">\n\n      <!-- SVG EDGES -->\n      {{ edgesSvg }}\n\n      <!-- NODE CARDS -->\n      <sc-for list=\"{{ nodes }}\" as=\"node\" hint-placeholder-count=\"8\">\n        <div style=\"{{ node.cardStyle }}\">\n\n          <!-- TOP COLOR BAR -->\n          <div style=\"{{ node.topBarStyle }}\"><\u002Fdiv>\n\n          <!-- HEADER / DRAG HANDLE -->\n          <div onmousedown=\"{{ node.onDragStart }}\" style=\"padding:7px 10px 7px;border-bottom:0.5px solid #2e2e2e;display:flex;align-items:center;gap:7px;cursor:grab;\">\n            <div style=\"{{ node.dotStyle }}\"><\u002Fdiv>\n            <span style=\"{{ node.labelStyle }}\">{{ node.label }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- AGGREGATE BAR -->\n          <sc-if value=\"{{ node.hasAgg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:6px 10px 5px;display:flex;gap:14px;flex-wrap:wrap;border-bottom:0.5px solid #2a2a2a;\">\n              <sc-for list=\"{{ node.headerAgg }}\" as=\"agg\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;flex-direction:column;\">\n                  <span style=\"font-size:8px;color:#555;letter-spacing:0.5px;text-transform:uppercase;\">{{ agg.key }}<\u002Fspan>\n                  <span style=\"font-size:14px;font-weight:600;line-height:1.2;color:{{ agg.color }};\">{{ agg.valueStr }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- BUILD SUMMARY ROWS -->\n          <sc-if value=\"{{ node.isBuildSummary }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:8px 0 4px;\">\n              <sc-for list=\"{{ node.buildRows }}\" as=\"br\" hint-placeholder-count=\"8\">\n                <div style=\"padding:2px 10px;display:flex;align-items:center;gap:8px;\">\n                  <span style=\"{{ br.labelStyle }}\">{{ br.label }}<\u002Fspan>\n                  <div style=\"flex:1;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;\">\n                    <div style=\"{{ br.barStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"{{ br.valueStyle }}\">{{ br.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"padding:5px 10px 7px;font-size:9px;color:#444;border-top:0.5px solid #2a2a2a;margin-top:3px;\">equipped only · gear + pets + mount<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ASCENSION PICKER -->\n          <sc-if value=\"{{ node.isAscension }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:10px;\">\n              <div style=\"font-size:9px;color:#555;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;\">Pillar (1–4)<\u002Fdiv>\n              <div bel:'Pets',          color:'#E96B3E'},\n    mounts:      {label:'Mounts',        color:'#2ACC97'},\n    buildSummary:{label:'Build Summary', color:'#378ADD'},\n    skills:      {label:'Skills',        color:'#DCA63B'},\n    techTree:    {label:'Tech Tree',     color:'#2982D9'},\n    ascension:   {label:'Ascension',     color:'#aaaaaa'},\n    dungeons:    {label:'Dungeons',      color:'#F05B5A'},\n  };\n\n  EDGES = [\n    {id:'e1',src:'gear',         tgt:'buildSummary',dashed:true, label:'substats',color:'#968DF2'},\n    {id:'e2',src:'pets',         tgt:'buildSummary',dashed:true, label:'substats',color:'#E96B3E'},\n    {id:'e3',src:'mounts',       tgt:'buildSummary',dashed:true, label:'substats',color:'#2ACC97'},\n    {id:'e4',src:'techTree',     tgt:'gear',        dashed:false,label:'unlocks', color:'#2982D9'},\n    {id:'e5',src:'buildSummary', tgt:'skills',      dashed:false,label:'governs', color:'#378ADD'},\n    {id:'e6',src:'skills',       tgt:'techTree',    dashed:true, label:'resource',color:'#DCA63B'},\n  ];\n\n  DP = {\n    gear:        {x:80,  y:160},\n    pets:        {x:80,  y:700},\n    mounts:      {x:430, y:1010},\n    buildSummary:{x:720, y:400},\n    skills:      {x:1260,y:290},\n    techTree:    {x:1260,y:80},\n    ascension:   {x:720, y:100},\n    dungeons:    {x:1260,y:520},\n  };\n\n  DD = {\n    gear:[\n      {id:'g1',name:'Casquette',     level:1,  rarity:'Multiverse',  substats:[{key:'AS',val:30.8},  {key:'LS',val:8.64}],       image:null},\n      {id:'g2',name:'Ethereal Socks',level:49, rarity:'Multiverse',  substats:[{key:'LS',val:6.71},  {key:'CritChance',val:6.33}],image:null},\n      {id:'g3',name:'Plasma Suit',   level:112,rarity:'Interstellar',substats:[{key:'DC',val:19.3},  {key:'SkillCD',val:-2.46}],  image:null},\n      {id:'g4',name:'Pelvic Sync',   level:106,rarity:'Interstellar',substats:[{key:'DC',val:18.6},  {key:'LS',val:16}],          image:null},\n      {id:'g5',name:'Plasma Rifle',  level:81, rarity:'Interstellar',substats:[{key:'DC',val:16.2},  {key:'HealthRegen',val:3.65}],image:null},\n      {id:'g6',name:'Impactors',     level:119,rarity:'Interstellar',substats:[{key:'DC',val:11.5},  {key:'Dmg',val:12.8}],       image:null},\n      {id:'g7',name:'Psi Choker',    level:118,rarity:'Interstellar',substats:[{key:'DC',val:7.63},  {key:'Melee',val:19.4}],     image:null},\n      {id:'g8',name:'Rarium Ring',   level:63, rarity:'Interstellar',substats:[{key:'AS',val:37.4},  {key:'CritDmg',val:19.9}],   image:null},\n    ],\n    pets:[\n      {id:'p1', name:'Electry',      rarity:'Ultimate', level:15,substats:[{key:'DC',val:12.9},    {key:'Melee',val:1.22}],    status:'equipped',image:null},\n      {id:'p2', name:'Electry',      rarity:'Ultimate', level:2, substats:[{key:'DC',val:18.7},    {key:'CritDmg',val:12}],    status:'equipped',image:null},\n      {id:'p3', name:'Cerberus',     rarity:'Legendary',level:23,substats:[{key:'AS',val:33.4},    {key:'Dmg',val:5.61}],      status:'equipped',image:null},\n      {id:'p4', name:'Treant',       rarity:'Ultimate', level:6, substats:[{key:'CritDmg',val:79.7},{key:'DC',val:1.42}],      status:'parked',  image:null},\n      {id:'p5', name:'Treant',       rarity:'Ultimate', level:1, substats:[{key:'LS',val:10.7},    {key:'CritChance',val:8.36}],status:'parked',  image:null},\n      {id:'p6', name:'Enchanted Elk',rarity:'Ultimate', level:1, substats:[{key:'CritChance',val:11.9},{key:'Health',val:7.92}],status:'parked',  image:null},\n      {id:'p7', name:'Cerberus',     rarity:'Legendary',level:25,substats:[{key:'DC',val:19.2},    {key:'Health',val:6.73}],   status:'parked',  image:null},\n      {id:'p8', name:'Kitsune',      rarity:'Legendary',level:24,substats:[{key:'CritChance',val:6.65},{key:'LS',val:16.8}],   status:'parked',  image:null},\n      {id:'p9', name:'Serpent',      rarity:'Legendary',level:20,substats:[{key:'DC',val:14.2},    {key:'SkillCD',val:-6.46}], status:'parked',  image:null},\n      {id:'p10',name:'Serpent',      rarity:'Legendary',level:1, substats:[{key:'DC',val:16.5},    {key:'Dmg',val:12.5}],      status:'parked',  image:null},\n    ],\n    mounts:[\n      {id:'m1',name:'Brown Leaf',rarity:'Common',level:10,substats:[{key:'LS',val:16.8},    {key:'Ranged',val:11}],  status:'equipped',image:null},\n      {id:'m2',name:'Lily Pad',  rarity:'Common',level:10,substats:[{key:'AS',val:31.2},    {key:'Health',val:1.21}],status:'parked',  image:null},\n      {id:'m3',name:'Brown Leaf',rarity:'Common',level:1, substats:[{key:'CritDmg',val:75.8},{key:'AS',val:18.7}],  status:'parked',  image:null},\n    ],\n    skills:[],\n    techTree:[],\n    ascension:{pillar:1,tier:1},\n    dungeons:[\n      {id:'d1',name:'Hammer Thief',drops:'Hammers / Gold',  image:null},\n      {id:'d2',name:'Ghost Town',  drops:'Skill Tickets',   image:null},\n      {id:'d3',name:'Zombie Rush', drops:'Potions',         image:null},\n      {id:'d4',name:'Invasion',    drops:'Eggshells',       image:null},\n    ],\n  };\n\n  state = {\n    data:null, positions:null,\n    co:{x:0,y:0}, cs:0.7,\n    panning:false, panStart:null,\n    dragId:null, dragNodeStart:null, dragMouseStart:null,\n    modal:null,\n  };\n\n  componentDidMount() {\n    const sd = localStorage.getItem('fm_data');\n    const sp = localStorage.getItem('fm_pos');\n    const data = sd ? JSON.parse(sd) : JSON.parse(JSON.stringify(this.DD));\n    const positions = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(this.DP));\n    this.setState({data, positions});\n    setTimeout(() => {\n      const vw = window.innerWidth, vh = window.innerHeight - 44;\n      const s = Math.min((vw - 40) / this.CW, (vh - 40) / this.CH, 0.86);\n      this.setState({cs:s, co:{x:(vw-this.CW*s)/2, y:(vh-this.CH*s)/2+2}});\n      const el = document.getElementById('fm-canvas');\n      if (el) {\n        el.addEventListener('wheel', this._wh = (e) => {\n          e.preventDefault();\n          const {cs,co} = this.state;\n          const d = e.deltaY > 0 ? 0.9 : 1.1;\n          const ns = Math.max(0.18, Math.min(3, cs * d));\n          const r = el.getBoundingClientRect();\n          const mx = e.clientX - r.left, my = e.clientY - r.top;\n          this.setState({cs:ns, co:{x:mx-(mx-co.x)*(ns/cs), y:my-(my-co.y)*(ns/cs)}});\n        }, {passive:false});\n      }\n    }, 80);\n  }\n\n  componentWillUnmount() {\n    const el = document.getElementById('fm-canvas');\n    if (el && this._wh) el.removeEventListener('wheel', this._wh);\n  }\n\n  sv = (data) => { localStorage.setItem('fm_data', JSON.stringify(data)); this.setState({data}); }\n  sp = (positions) => { localStorage.setItem('fm_pos', JSON.stringify(positions)); this.setState({positions}); }\n  resetLayout = () => this.sp(JSON.parse(JSON.stringify(this.DP)))\n\n  onMD = (e) => {\n    if (e.target === e.currentTarget || e.target.dataset.bg === '1') {\n      this.setState({panning:true, panStart:{x:e.clientX-this.state.co.x, y:e.clientY-this.state.co.y}});\n    }\n  }\n  onMM = (e) => {\n    const {panning,panStart,dragId,dragNodeStart,dragMouseStart,positions,cs} = this.state;\n    if (panning && panStart) this.setState({co:{x:e.clientX-panStart.x, y:e.clientY-panStart.y}});\n    if (dragId && dragNodeStart && dragMouseStart) {\n      const dx=(e.clientX-dragMouseStart.x)/cs, dy=(e.clientY-dragMouseStart.y)/cs;\n      this.setState({positions:{...positions,[dragId]:{x:Math.max(0,dragNodeStart.x+dx),y:Math.max(0,dragNodeStart.y+dy)}}});\n    }\n  }\n  onMU = () => {\n    if (this.state.dragId) this.sp(this.state.positions);\n    this.setState({panning:false,panStart:null,dragId:null,dragNodeStart:null,dragMouseStart:null});\n  }\n  onND = (id, e) => {\n    e.stopPropagation();\n    this.setState({dragId:id, dragNodeStart:{...this.state.positions[id]}, dragMouseStart:{x:e.clientX,y:e.clientY}});\n  }\n\n  openEdit = (nt, id) => {\n    const arr = this.state.data[nt];\n    const item = arr && arr.find(i => i.id === id);\n    if (!item) return;\n    this.setState({modal:{nt,id,draft:JSON.parse(JSON.stringify(item))}});\n  }\n  openAdd = (nt) => {\n    const tmpl = {\n      gear:    {id:'n'+Date.now(),name:'',level:1,rarity:'Common',substats:[{key:'AS',val:0}],baseDmg:0,baseHp:0,image:null},\n      pets:    {id:'n'+Date.now(),name:'',rarity:'Common',level:1,substats:[{key:'AS',val:0}],status:'parked',baseDmg:0,baseHp:0,image:null},\n      mounts:  {id:'n'+Date.now(),name:'',rarity:'Common',level:1,substats:[{key:'AS',val:0}],status:'parked',baseDmg:0,baseHp:0,image:null},\n      skills:  {id:'n'+Date.now(),name:'',drops:'',image:null},\n      techTree:{id:'n'+Date.now(),name:'',drops:'',image:null},\n      dungeons:{id:'n'+Date.now(),name:'',drops:'',image:null},\n    };\n    if (!tmpl[nt]) return;\n    this.setState({modal:{nt,id:null,draft:tmpl[nt]}});\n  }\n\n  closeModal = () => this.setState({modal:null})\n  stopProp = (e) => e.stopPropagation()\n  ud = (f,v) => this.setState(s => ({modal:{...s.modal,draft:{...s.modal.draft,[f]:v}}}))\n  usk = (i,k) => this.setState(s => { const ss=[...s.modal.draft.substats]; ss[i]={...ss[i],key:k}; return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  usv = (i,v) => this.setState(s => { const ss=[...s.modal.draft.substats]; ss[i]={...ss[i],val:parseFloat(v)||0}; return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  addSS = () => this.setState(s => { const ss=[...(s.modal.draft.substats||[]),{key:'AS',val:0}]; return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  remSS = (i) => this.setState(s => { const ss=s.modal.draft.substats.filter((_,j)=>j!==i); return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  moveSSUp = (i) => this.setState(s => { if(i===0)return null; const ss=[...s.modal.draft.substats];[ss[i],ss[i-1]]=[ss[i-1],ss[i]];return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  moveSSDown = (i) => this.setState(s => { const ss=[...s.modal.draft.substats];if(i>=ss.length-1)return null;[ss[i],ss[i+1]]=[ss[i+1],ss[i]];return {modal:{...s.modal,draft:{...s.modal.draft,substats:ss}}}; })\n  dupItem = () => {\n    const {modal,data}=this.state; if(!modal||!modal.id)return;\n    const nd=JSON.parse(JSON.stringify(data)); const arr=nd[modal.nt];\n    const orig=arr.find(i=>i.id===modal.id); if(!orig)return;\n    const copy={...JSON.parse(JSON.stringify(orig)),id:'n'+Date.now(),name:(orig.name||'')+' (copy)'};\n    arr.splice(arr.findIndex(i=>i.id===modal.id)+1,0,copy);\n    this.sv(nd); this.setState({modal:null});\n  }\n  moveItemInSection = (nt,id,dir) => {\n    const nd=JSON.parse(JSON.stringify(this.state.data)); const arr=nd[nt];\n    const idx=arr.findIndex(i=>i.id===id); if(idx===-1)return;\n    const status=arr[idx].status;\n    if(dir==='up'){\n      let pi=-1; for(let j=idx-1;j>=0;j--){if(arr[j].status===status){pi=j;break;}} if(pi===-1)return;\n      [arr[idx],arr[pi]]=[arr[pi],arr[idx]];\n    } else {\n      let ni=-1; for(let j=idx+1;j<arr.length;j++){if(arr[j].status===status){ni=j;break;}} if(ni===-1)return;\n      [arr[idx],arr[ni]]=[arr[ni],arr[idx]];\n    }\n    this.sv(nd);\n  }\n\n  saveModal = () => {\n    const {modal,data} = this.state;\n    if (!modal) return;\n    const nd = JSON.parse(JSON.stringify(data));\n    const arr = nd[modal.nt];\n    if (!arr) return;\n    if (modal.id) { const idx=arr.findIndex(x=>x.id===modal.id); if(idx>=0) arr[idx]=modal.draft; }\n    else arr.push(modal.draft);\n    this.sv(nd);\n    this.setState({modal:null});\n  }\n  delItem = () => {\n    const {modal,data} = this.state;\n    if (!modal||!modal.id) return;\n    const nd = JSON.parse(JSON.stringify(data));\n    nd[modal.nt] = nd[modal.nt].filter(i=>i.id!==modal.id);\n    this.sv(nd);\n    this.setState({modal:null});\n  }\n  dropImg = (nt, id, e) => {\n    e.preventDefault(); e.stopPropagation();\n    const f = e.dataTransfer.files[0];\n    if (!f || !f.type.startsWith('image/')) return;\n    const r = new FileReader();\n    r.onload = ev => {\n      const nd = JSON.parse(JSON.strin
